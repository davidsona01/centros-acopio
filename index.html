const distKm=(la1,lo1,la2,lo2)=>{const R=6371,dLat=(la2-la1)*Math.PI/180,dLon=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));};

const fmtWA=(num)=>{if(!num)return"";const c=num.replace(/\D/g,"");if(c.startsWith("58"))return c;return"58"+c.replace(/^0+/,"");};

const fmtTel=(num)=>{if(!num)return"#";const d=num.replace(/\D/g,"");if(d)return"tel:"+d;const m={a:2,b:2,c:2,d:3,e:3,f:3,g:4,h:4,i:4,j:5,k:5,l:5,m:6,n:6,o:6,p:7,q:7,r:7,s:7,t:8,u:8,v:8,w:9,x:9,y:9,z:9};return"tel:"+num.toLowerCase().split("").map(c=>m[c]||c).join("");};

const genId=(existentes)=>{let id;do{id="A"+String(Math.floor(Math.random()*9000)+1000)}while(existentes.some(e=>e.id===id));return id;};

const hashPass=async(pass)=>{const enc=new TextEncoder().encode(pass);const buf=await crypto.subtle.digest("SHA-256",enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");};

const genWhatsAppMsg=(c)=>{
  const criticos=Object.entries(c.necesidades||{}).filter(([,v])=>v==="CRÍTICO").map(([k])=>k);
  const altos=Object.entries(c.necesidades||{}).filter(([,v])=>v==="ALTO").map(([k])=>k);
  const pct=Math.round((c.recibido/(c.capacidad||1))*100);
  let msg=`📋 *ESTADO CENTRO DE ACOPIO*\n`;
  msg+=`━━━━━━━━━━━━━━━━━━\n`;
  msg+=`📍 *${c.nombre}*\n`;
  msg+=`🗺️ ${c.ciudad}, ${c.estado}\n`;
  msg+=`👤 Coordinador: ${c.responsable||"N/D"}\n`;
  msg+=`📱 WhatsApp: +58 ${fmtWA(c.whatsapp)}\n`;
  msg+=`━━━━━━━━━━━━━━━━━━\n`;
  msg+=`📦 Capacidad: ${c.capacidad} unidades\n`;
  msg+=`📥 Recibido: ${c.recibido} (${pct}%)\n`;
  msg+=`✅ Verificado: ${c.verificado?"Sí":"No"}\n`;
  if(criticos.length>0){
    msg+=`\n🔴 *NECESIDADES CRÍTICAS:*\n`;
    criticos.forEach(n=>{msg+=`  ⚠️ ${n}\n`;});
  }
  if(altos.length>0){
    msg+=`\n🟠 *NECESIDADES ALTAS:*\n`;
    altos.forEach(n=>{msg+=`  ⚠️ ${n}\n`;});
  }
  if(c.lat&&c.lng){
    msg+=`\n🗺️ Ver en mapa: https://www.google.com/maps?q=${c.lat},${c.lng}&z=17\n`;
  }
  msg+=`\n━━━━━━━━━━━━━━━━━━\n`;
  msg+=`Red Nacional de Acopio Venezuela 2026`;
  return msg;
};
const shareWhatsApp=(c)=>{
  const msg=genWhatsAppMsg(c);
  const url=`https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
};

function CertQR({value,size=140}){
  const svgRef=useRef(null);
  useEffect(()=>{
    if(!value||!svgRef.current)return;
    const draw=()=>{
      const QR=window.QRCode||window.qrcode;
      if(!QR||!svgRef.current)return;
      const qr=QR(0,"M");
      qr.addData(value);
      qr.make();
      const mod=qr.getModuleCount(),cell=size/mod;
      const p=[`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`];
      p.push(`<rect width="${size}" height="${size}" fill="#fff"/>`);
      for(let r=0;r<mod;r++)for(let c=0;c<mod;c++)if(qr.isDark(r,c))p.push(`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="#111"/>`);
      p.push("</svg>");
      svgRef.current.innerHTML=p.join("");
    };
    const QR=window.QRCode||window.qrcode;
    if(QR){draw();return;}
    const s=document.createElement("script");s.id="qr-gen";s.src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js";s.onload=draw;s.onerror=()=>{if(svgRef.current)svgRef.current.innerHTML='<div style="color:#999;font-size:11px">QR no disponible</div>';};document.head.appendChild(s);
  },[value,size]);
  return(<div ref={svgRef} style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",background:"#fff",borderRadius:4}}/>);
}

  const [form,setForm]=useState({nombre:"",telefono:"",habilidades:[],disponibilidad:"",centroAsignado:"",foto:"",experiencia:"",notas:"",dias:[]});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleHab=(h)=>setForm(f=>({...f,habilidades:f.habilidades.includes(h)?f.habilidades.filter(x=>x!==h):[...f.habilidades,h]}));
  const toggleDia=(d)=>setForm(f=>({...f,dias:f.dias.includes(d)?f.dias.filter(x=>x!==d):[...f.dias,d]}));
  const handleVolFoto=(e)=>{const file=e.target.files[0];if(!file)return;if(file.size>300000)return;const r=new FileReader();r.onload=(ev)=>{set("foto",ev.target.result);};r.readAsDataURL(file);};
  const registrar=()=>{if(!form.nombre||!form.telefono)return;const v={...form,id:"V"+Date.now(),fecha:new Date().toISOString().slice(0,10),activo:true,horas:0};setVoluntarios(p=>[...p,v]);setForm({nombre:"",telefono:"",habilidades:[],disponibilidad:"",centroAsignado:"",foto:"",experiencia:"",notas:"",dias:[]});setShowForm(false);};
  const activos=voluntarios.filter(v=>v.activo).length;
  const asignados=voluntarios.filter(v=>v.centroAsignado).length;
  const totalHoras=voluntarios.reduce((a,v)=>a+(v.horas||0),0);
  const si={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 10px",color:T.text,fontSize:12,outline:"none",boxSizing:"border-box"};
  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:14,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,color:T.text}}>👥 {t("voluntarios")}</div>
        <button onClick={()=>setShowForm(!showForm)} style={{background:"#CF1A2F",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:11}}>{showForm?"? Cancelar":"+ Registrar"}</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
        {[["👥",voluntarios.length,"Total","#4285F4"],["?",activos,"Activos","#4CAF50"],["📋",asignados,"Asignados","#FF8C00"],["⏰",totalHoras,"Horas","#9C27B0"]].map(([ic,v,lbl,color])=>(
          <div key={lbl} style={{background:T.surface2,borderRadius:8,padding:"8px",textAlign:"center",borderBottom:`2px solid ${color}`}}>
            <div style={{fontSize:16}}>{ic}</div>
            <div style={{fontWeight:800,fontSize:16,color}}>{v}</div>
            <div style={{fontSize:10,color:T.textMuted}}>{lbl}</div>
          </div>
        ))}
      </div>
      {showForm&&(
        <div style={{background:T.surface2,borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Nombre *</label><input value={form.nombre} onChange={e=>set("nombre",e.target.value)} placeholder="Nombre completo" style={si}/></div>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Teléfono *</label><input value={form.telefono} onChange={e=>set("telefono",e.target.value)} placeholder="04121234567" style={si}/></div>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:4}}>Habilidades</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {HABILIDADES.map(h=><button key={h} onClick={()=>toggleHab(h)} style={{padding:"3px 8px",borderRadius:12,fontSize:10,cursor:"pointer",background:form.habilidades.includes(h)?"#CF1A2F":T.border,color:form.habilidades.includes(h)?"#fff":T.textMuted,border:"none",fontWeight:600}}>{h}</button>)}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Disponibilidad</label><select value={form.disponibilidad} onChange={e=>set("disponibilidad",e.target.value)} style={si}><option value="">Seleccionar...</option>{DISPONIBILIDADES.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Centro asignado</label><select value={form.centroAsignado} onChange={e=>set("centroAsignado",e.target.value)} style={si}><option value="">Sin asignar</option>{centros.map(c=><option key={c.id} value={c.id}>{c.nombre.slice(0,25)}</option>)}</select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Experiencia / Certificaciones</label><input value={form.experiencia} onChange={e=>set("experiencia",e.target.value)} placeholder="Ej: Cruz Roja, SAMU..." style={si}/></div>
            <div>
              <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Foto del voluntario</label>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <label style={{display:"flex",alignItems:"center",gap:4,background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 8px",cursor:"pointer",fontSize:10,color:T.textMuted,flex:1}}>
                  📸 {form.foto?"Foto cargada":"Subir foto"}
                  <input type="file" accept="image/*" onChange={handleVolFoto} style={{display:"none"}}/>
                </label>
                {form.foto&&<img src={form.foto} alt="" style={{width:32,height:32,borderRadius:6,objectFit:"cover"}}/>}
              </div>
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Días disponibles</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {DIAS.map(d=><button key={d} onClick={()=>toggleDia(d)} style={{padding:"3px 8px",borderRadius:12,fontSize:10,cursor:"pointer",background:form.dias.includes(d)?"#4CAF50":T.border,color:form.dias.includes(d)?"#fff":T.textMuted,border:"none",fontWeight:600}}>{d}</button>)}
            </div>
          </div>
          <div style={{marginBottom:8}}><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Notas adicionales</label><input value={form.notas} onChange={e=>set("notas",e.target.value)} placeholder="Observaciones, idiomas, etc." style={si}/></div>
          <button onClick={registrar} disabled={!form.nombre||!form.telefono} style={{width:"100%",marginTop:8,background:form.nombre&&form.telefono?"#CF1A2F":"#666",color:"#fff",border:"none",borderRadius:6,padding:"8px",cursor:form.nombre&&form.telefono?"pointer":"not-allowed",fontWeight:700,fontSize:12}}>✅ Registrar Voluntario</button>
        </div>
      )}
      <div style={{maxHeight:200,overflow:"auto"}}>
        {voluntarios.length===0?<div style={{textAlign:"center",padding:16,color:T.textFaint,fontSize:12}}>No hay voluntarios registrados</div>:
        voluntarios.map(v=>(
          <div key={v.id} style={{display:"flex",alignItems:"center",gap:10,background:T.surface2,borderRadius:8,padding:"8px 10px",marginBottom:6,borderLeft:`3px solid ${v.activo?"#4CAF50":"#FF3B3B"}`}}>
            {v.foto?<img src={v.foto} alt="" style={{width:32,height:32,borderRadius:"50%",objectFit:"cover",flexShrink:0}}/>:<div style={{width:32,height:32,borderRadius:"50%",background:v.activo?"#E8F5E9":"#FEE2E2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>👤</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:12,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.nombre}</div>
              <div style={{fontSize:10,color:T.textMuted}}>📞 {v.telefono} · {v.disponibilidad||"N/D"} · ⏰ {v.horas||0}h</div>
              {v.dias&&v.dias.length>0&&<div style={{fontSize:9,color:T.textFaint,marginTop:1}}>📅 {v.dias.join(", ")}</div>}
              {v.experiencia&&<div style={{fontSize:9,color:T.textFaint}}>🏅 {v.experiencia}</div>}
            </div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",maxWidth:120}}>
              {v.habilidades.slice(0,3).map(h=><span key={h} style={{fontSize:8,background:T.tagBg,color:T.tagText,padding:"1px 5px",borderRadius:8}}>{h}</span>)}
            </div>
            <button onClick={()=>setVoluntarios(p=>p.map(x=>x.id===v.id?{...x,activo:!x.activo}:x))} style={{fontSize:10,background:v.activo?"#FEE2E2":"#E8F5E9",color:v.activo?"#DC2626":"#2E7D32",border:"none",borderRadius:4,padding:"3px 6px",cursor:"pointer",fontWeight:600}}>{v.activo?"Desactivar":"Activar"}</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function InventarioPanel({inventario,setInventario,centros,T}){
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({tipo:"entrada",insumo:"",cantidad:"",centroId:"",notas:"",fecha:new Date().toISOString().slice(0,10)});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const registrar=()=>{if(!form.insumo||!form.cantidad)return;const m={...form,id:"M"+Date.now(),cantidad:parseInt(form.cantidad)};setInventario(p=>[...p,m]);setForm({tipo:"entrada",insumo:"",cantidad:"",centroId:"",notas:"",fecha:new Date().toISOString().slice(0,10)});setShowForm(false);};
  const entradas=inventario.filter(m=>m.tipo==="entrada").reduce((a,m)=>a+m.cantidad,0);
  const salidas=inventario.filter(m=>m.tipo==="salida").reduce((a,m)=>a+m.cantidad,0);
  const insumosCrit=inventario.filter(m=>m.tipo==="salida").reduce((a,m)=>{a[m.insumo]=(a[m.insumo]||0)+m.cantidad;return a;},{});
  const topCrit=Object.entries(insumosCrit).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const ALL_INSUMOS=Object.values(INSUMOS).flat();
  const si={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 10px",color:T.text,fontSize:12,outline:"none",boxSizing:"border-box"};
  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:14,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,color:T.text}}>📦 {t("inventario")}</div>
        <button onClick={()=>setShowForm(!showForm)} style={{background:"#1A73E8",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:11}}>{showForm?"? Cancelar":"+ Movimiento"}</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
        {[["📦",inventario.length,"Total","#4285F4"],["📥",entradas,"Entradas","#4CAF50"],["📤",salidas,"Salidas","#FF8C00"],["🔴",topCrit.length,"Críticos","#FF3B3B"]].map(([ic,v,lbl,color])=>(
          <div key={lbl} style={{background:T.surface2,borderRadius:8,padding:"8px",textAlign:"center",borderBottom:`2px solid ${color}`}}>
            <div style={{fontSize:16}}>{ic}</div>
            <div style={{fontWeight:800,fontSize:16,color}}>{v}</div>
            <div style={{fontSize:10,color:T.textMuted}}>{lbl}</div>
          </div>
        ))}
      </div>
      {showForm&&(
        <div style={{background:T.surface2,borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <button onClick={()=>set("tipo","entrada")} style={{flex:1,background:form.tipo==="entrada"?"#4CAF50":T.border,color:form.tipo==="entrada"?"#fff":T.textMuted,border:"none",borderRadius:6,padding:"7px",cursor:"pointer",fontWeight:700,fontSize:11}}>📥 Entrada</button>
            <button onClick={()=>set("tipo","salida")} style={{flex:1,background:form.tipo==="salida"?"#FF8C00":T.border,color:form.tipo==="salida"?"#fff":T.textMuted,border:"none",borderRadius:6,padding:"7px",cursor:"pointer",fontWeight:700,fontSize:11}}>📤 Salida</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Insumo *</label><select value={form.insumo} onChange={e=>set("insumo",e.target.value)} style={si}><option value="">Seleccionar...</option>{ALL_INSUMOS.map(i=><option key={i} value={i}>{i}</option>)}</select></div>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Cantidad *</label><input type="number" value={form.cantidad} onChange={e=>set("cantidad",e.target.value)} placeholder="0" style={si}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Centro destino</label><select value={form.centroId} onChange={e=>set("centroId",e.target.value)} style={si}><option value="">Todos</option>{centros.map(c=><option key={c.id} value={c.id}>{c.nombre.slice(0,25)}</option>)}</select></div>
            <div><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>set("fecha",e.target.value)} style={si}/></div>
          </div>
          <div style={{marginBottom:8}}><label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:3}}>Notas</label><input value={form.notas} onChange={e=>set("notas",e.target.value)} placeholder="Observaciones..." style={si}/></div>
          <button onClick={registrar} disabled={!form.insumo||!form.cantidad} style={{width:"100%",background:form.insumo&&form.cantidad?"#1A73E8":"#666",color:"#fff",border:"none",borderRadius:6,padding:"8px",cursor:form.insumo&&form.cantidad?"pointer":"not-allowed",fontWeight:700,fontSize:12}}>? Registrar Movimiento</button>
        </div>
      )}
      {topCrit.length>0&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textMuted,marginBottom:4}}>Mayor demanda de salidas:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {topCrit.map(([ins,n])=><span key={ins} style={{fontSize:10,background:"#FEE2E2",color:"#DC2626",padding:"2px 7px",borderRadius:6,fontWeight:600}}>⚠️ {ins} ({n})</span>)}
          </div>
        </div>
      )}
      <div style={{maxHeight:200,overflow:"auto"}}>
        {inventario.length===0?<div style={{textAlign:"center",padding:16,color:T.textFaint,fontSize:12}}>No hay movimientos registrados</div>:
        inventario.slice().reverse().slice(0,10).map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,background:T.surface2,borderRadius:8,padding:"7px 10px",marginBottom:5,borderLeft:`3px solid ${m.tipo==="entrada"?"#4CAF50":"#FF8C00"}`}}>
            <span style={{fontSize:14}}>{m.tipo==="entrada"?"📥":"📤"}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:11,color:T.text}}>{m.insumo}</div>
              <div style={{fontSize:10,color:T.textMuted}}>{m.fecha} · {centros.find(c=>c.id===m.centroId)?.nombre?.slice(0,20)||"General"}</div>
            </div>
            <div style={{fontWeight:800,fontSize:12,color:m.tipo==="entrada"?"#4CAF50":"#FF8C00"}}>{m.tipo==="entrada"?"+":"-"}{m.cantidad}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AnalyticsPanel({centros,refugios,voluntarios,inventario,T}){
  const[tab,setTab]=useState("resumen");
  const[exportando,setExportando]=useState(null);
  const[tipoExport,setTipoExport]=useState("centros");
  const exportCSV=()=>{
    setExportando(tipoExport);
    let csv="",filename="";
    if(tipoExport==="centros"){
      csv="ID,Nombre,Estado,Ciudad,Tipo,Responsable,WhatsApp,Capacidad,Recibido,Verificado\n";
      centros.forEach(c=>{csv+=`"${c.id}","${c.nombre}","${c.estado}","${c.ciudad}","${c.tipo}","${c.responsable}","${c.whatsapp}",${c.capacidad},${c.recibido},${c.verificado?"Sí":"No"}\n`;});
      filename="centros_acopio.csv";
    }else if(tipoExport==="refugios"){
      csv="ID,Nombre,Ciudad,Latitud,Longitud,Capacidad,Ocupados,Estado,Necesidades\n";
      refugios.forEach(r=>{csv+=`"${r.id}","${r.name}","${r.city}",${r.lat},${r.lon},${r.cap},${r.cur},"${r.status}","${(r.needs||[]).join("; ")}"\n`;});
      filename="refugios.csv";
    }else if(tipoExport==="voluntarios"){
      csv="ID,Nombre,Teléfono,Habilidades,Disponibilidad,Centro,Activo,Fechas\n";
      voluntarios.forEach(v=>{csv+=`"${v.id}","${v.nombre}","${v.telefono}","${v.habilidades.join("; ")}","${v.disponibilidad}","${v.centroAsignado||"N/D"}",${v.activo?"Sí":"No"},"${v.fecha}"\n`;});
      filename="voluntarios.csv";
    }else if(tipoExport==="estadisticas"){
      csv="Métrica,Valor\n";
      csv+=`"Total Centros","${centros.length}"\n`;
      csv+=`"Total Refugios","${refugios.length}"\n`;
      csv+=`"Total Voluntarios","${voluntarios.length}"\n`;
      csv+=`"Total Movimientos Inventario","${inventario.length}"\n`;
      const verificados=centros.filter(c=>c.verificado).length;
      csv+=`"Centros Verificados","${verificados}/${centros.length}"\n`;
      const porEstado={};centros.forEach(c=>{if(!porEstado[c.estado])porEstado[c.estado]=0;porEstado[c.estado]++;});
      Object.entries(porEstado).sort((a,b)=>b[1]-a[1]).forEach(([est,n])=>{csv+=`"Centros en ${est}","${n}"\n`;});
      const porNivel={"CRÍTICO":0,"ALTO":0,"MEDIO":0,"BAJO":0};
      centros.forEach(c=>Object.values(c.necesidades||{}).forEach(v=>{if(porNivel[v]!==undefined)porNivel[v]++;}));
      Object.entries(porNivel).forEach(([lv,n])=>{csv+=`"Necesidades ${lv}","${n}"\n`;});
      filename="estadisticas_acopio.csv";
    }
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const link=document.createElement("a");link.href=URL.createObjectURL(blob);link.download=filename;link.click();
    setTimeout(()=>setExportando(null),1500);
  };
  const exportPDF=()=>{
    setExportando("pdf");
    const fecha=new Date().toLocaleDateString("es-VE",{day:"2-digit",month:"long",year:"numeric"});
    const verificados=centros.filter(c=>c.verificado).length;
    const totalRecibido=centros.reduce((a,c)=>a+c.recibido,0);
    const totalCapacidad=centros.reduce((a,c)=>a+c.capacidad,0);
    const pctGeneral=totalCapacidad>0?Math.round((totalRecibido/totalCapacidad)*100):0;
    const porNivel={"CRÍTICO":0,"ALTO":0,"MEDIO":0,"BAJO":0};
    centros.forEach(c=>Object.values(c.necesidades||{}).forEach(v=>{if(porNivel[v]!==undefined)porNivel[v]++;}));
    const insumosCrit={};centros.forEach(c=>Object.entries(c.necesidades||{}).forEach(([k,v])=>{if(v==="CRÍTICO"){if(!insumosCrit[k])insumosCrit[k]=0;insumosCrit[k]++;}}));
    const topInsumos=Object.entries(insumosCrit).sort((a,b)=>b[1]-a[1]).slice(0,8);
    let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reporte Acopio</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{padding:30px;color:#1a1a1a}h1{color:#8B0000;font-size:22px;margin-bottom:4px}h2{color:#CF1A2F;font-size:15px;margin:20px 0 8px}p{color:#666;font-size:12px;margin-bottom:16px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.stat{background:#F4F6FB;border:1px solid #DDE3EE;border-radius:8px;padding:12px;text-align:center}.stat-val{font-size:22px;font-weight:800;color:#8B0000}.stat-lbl{font-size:10px;color:#6B7280;margin-top:2px}table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px}th{background:#8B0000;color:#fff;padding:6px 8px;text-align:left}td{padding:5px 8px;border-bottom:1px solid #eee}footer{margin-top:30px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#aaa;text-align:center}</style></head><body>`;
    html+=`<h1>📊 Reporte Red de Acopio</h1><p>${fecha} · Reporte completo de emergencia sísmica</p>`;
    html+=`<div class="stats"><div class="stat"><div class="stat-val">${centros.length}</div><div class="stat-lbl">Centros</div></div><div class="stat"><div class="stat-val">${refugios.length}</div><div class="stat-lbl">Refugios</div></div><div class="stat"><div class="stat-val">${totalCrit}</div><div class="stat-lbl">Alertas Críticas</div></div><div class="stat"><div class="stat-val">${pctGeneral}%</div><div class="stat-lbl">Capacidad</div></div></div>`;
    html+=`<h2>📋 Insumos Críticos</h2><p>${topInsumos.map(([ins,n])=>`${ins} (${n} centros)`).join(" · ")||"Ninguno"}</p>`;
    html+=`<h2>📦 Centros de Acopio</h2><table><thead><tr><th>ID</th><th>Nombre</th><th>Estado</th><th>Ciudad</th><th>Cap.</th><th>Verif.</th></tr></thead><tbody>${centros.map(c=>`<tr><td>${c.id}</td><td>${c.nombre}</td><td>${c.estado}</td><td>${c.ciudad}</td><td>${c.recibido}/${c.capacidad}</td><td>${c.verificado?"✅":"❌"}</td></tr>`).join("")}</tbody></table>`;

        const urg=Object.entries(c.necesidades||{}).filter(([,v])=>v==="CRÍTICO").map(([k])=>k).slice(0,3);
const badge=cercano&&!activo?`<div style="background:#1A73E8;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px;font-weight:700">📍 Cercano a ti</div><br/>`:"";
        const popup=`<div style="font-family:Inter,sans-serif;min-width:220px;padding:4px 0">${badge}<div style="font-weight:800;font-size:14px;color:#111;margin-bottom:2px">${c.nombre}</div><div style="color:#666;font-size:11px;margin-bottom:5px">📍 ${c.ciudad}, ${c.estado}</div>${c.verificado?'<span style="background:#E8F5E9;color:#2E7D32;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">✅ Verificado</span>':'<span style="background:#FFF8E1;color:#F57F17;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">⏳ Pendiente</span>'}${urg.length?`<div style="margin-top:7px"><div style="font-size:10px;color:#999;margin-bottom:3px">Necesita urgente:</div>${urg.map(u=>`<span style="display:inline-block;background:#FFEBEE;color:#C62828;font-size:10px;padding:2px 6px;border-radius:4px;margin:1px;font-weight:600">⚠️ ${u}</span>`).join("")}</div>`:""}<div style="margin-top:9px;display:flex;gap:5px"><a href="https://wa.me/${fmtWA(c.whatsapp)}" target="_blank" style="flex:1;text-align:center;background:#075E54;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">💬 WhatsApp</a><a href="https://www.google.com/maps?q=${c.lat},${c.lng}&z=17" target="_blank" style="flex:1;text-align:center;background:#1A73E8;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">🗺️ Maps</a></div></div>`;
        const mrk=L.marker([c.lat,c.lng],{icon,zIndexOffset:activo?2000:cercano?1000:0}).addTo(map).bindPopup(popup,{maxWidth:260});
        mrk.on("click",()=>onPin(c));mrkMap.current[c.id]=mrk;
      });
    };
    if(ready.current){draw();return;}
    const poll=()=>{if(ready.current){clearInterval(poll);draw();}};
    poll.i=setInterval(poll,200);intervals.current.push(poll.i);
    return()=>{if(poll.i)clearInterval(poll.i);};
  },[centros,refugios,hospitales,pinActivoId,cercanoIds]);

  useEffect(()=>{
    const go=()=>{
      const map=mapInst.current,L=window.L;if(!map||!L||!userPos)return;
      userMrk.current?.remove();circRef.current?.remove();
      const icon=L.divIcon({className:"",html:`<div style="width:22px;height:22px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 0 0 5px rgba(66,133,244,.25)"></div>`,iconSize:[22,22],iconAnchor:[11,11]});
      userMrk.current=L.marker([userPos.lat,userPos.lng],{icon,zIndexOffset:3000}).addTo(map).bindPopup("<b style='font-family:Inter'>📍 Tu ubicación</b>").openPopup();
      circRef.current=L.circle([userPos.lat,userPos.lng],{radius:userPos.acc||800,color:"#4285F4",fillColor:"#4285F4",fillOpacity:0.07,weight:1}).addTo(map);
      if(firstUserPos.current){firstUserPos.current=false;map.flyTo([userPos.lat,userPos.lng],12,{duration:1.8});}
    };
    if(ready.current){go();return;}
    const poll=()=>{if(ready.current){clearInterval(poll);go();}};
    poll.i=setInterval(poll,200);intervals.current.push(poll.i);
    return()=>{if(poll.i)clearInterval(poll.i);};
  },[userPos]);

  const flyTo=(c)=>{const map=mapInst.current,L=window.L;if(!map||!L||!c.lat)return;const lng=c.lng||c.lon;if(!lng)return;map.flyTo([c.lat,lng],15,{duration:1.1});const key=mrkMap.current[c.id]?c.id:`R-${c.id}`;setTimeout(()=>mrkMap.current[key]?.openPopup(),1250);};
  return{flyTo,mapInst};
}

function MapaPrincipal({centros,refugios,hospitales,pinActivoId,onPinClick,mapaRef,showHeatMap,setShowHeatMap,heatFilter,setHeatFilter,T}){
  const mapRef=useRef(null);
  const [userPos,setUserPos]=useState(null);
  const [cercanos,setCercanos]=useState([]);
  const [gpsLoad,setGpsLoad]=useState(false);
  const [gpsErr,setGpsErr]=useState("");
  const [mapLoaded,setMapLoaded]=useState(false);
  useEffect(()=>{
    if(!mapRef.current)return;
    const checkMap=()=>{if(mapRef.current?.querySelector(".leaflet-container")){setMapLoaded(true);return true;}return false;};
    if(checkMap())return;
    const o=new MutationObserver(()=>{if(checkMap())o.disconnect();});
    o.observe(mapRef.current,{childList:true,subtree:true});
    const fallback=setTimeout(()=>{setMapLoaded(true);},4000);
    return()=>{o.disconnect();clearTimeout(fallback);};
  },[]);
  const cercanoIds=cercanos.map(c=>c.id);
  const {flyTo}=useLeaflet(mapRef,centros,refugios,hospitales,userPos,pinActivoId,cercanoIds,onPinClick,showHeatMap,heatFilter);
  useEffect(()=>{if(mapaRef)mapaRef.current={flyTo};},[flyTo]);

  const usarGPS=()=>{
    setGpsLoad(true);setGpsErr("");setCercanos([]);
    if(!navigator.geolocation){setGpsErr("Sin soporte GPS.");setGpsLoad(false);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{const{latitude:la,longitude:lo,accuracy:acc}=pos.coords;setUserPos({lat:la,lng:lo,acc});const ord=centros.filter(c=>c.lat&&c.lng).map(c=>({...c,dist:distKm(la,lo,c.lat,c.lng)})).sort((a,b)=>a.dist-b.dist).slice(0,5);setCercanos(ord);setGpsLoad(false);},
      ()=>{setGpsErr("No se pudo obtener ubicación.");setGpsLoad(false);},
      {timeout:12000,enableHighAccuracy:true}
    );
  };

  return(
    <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${T.border}`,boxShadow:"0 4px 20px rgba(0,0,0,.1)",marginBottom:22}}>
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <span style={{fontWeight:700,fontSize:14,color:T.text}}>🗺️ Mapa de Centros, Refugios, Hospitales y Sismos</span>
          <div style={{fontSize:10,color:T.textMuted,marginTop:1}}>
            <span style={{marginRight:10}}>📦 {centros.length} centros</span>
            <span style={{marginRight:10}}>🏕️ {refugios.length} refugios</span>
            <span style={{marginRight:10}}>🏥 {hospitales.length} hospitales</span>
            <span style={{marginRight:10}}>🌊 Sismos (USGS)</span>
            {showHeatMap&&<span style={{color:"#FF9100",fontWeight:600}}>🔥 Mapa de calor activo</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",background:T.surface2,borderRadius:8,padding:"5px 10px",border:`1px solid ${T.border}`,fontSize:10,color:T.textMuted,flexWrap:"wrap"}}>
            {[["🔴","Crítico"],["✅","Verificado"],["📍","Cercano"]].map(([ic,lb])=>(
              <span key={lb} style={{display:"flex",alignItems:"center",gap:2}}>{ic} {lb}</span>
            ))}
            <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#1A73E8",border:"1.5px solid #fff",verticalAlign:"middle"}}></span> Refugio</span>
            <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"#2E7D32",border:"1.5px solid #fff",verticalAlign:"middle"}}></span> Hospital</span>
            <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{display:"inline-block",width:14,height:14,borderRadius:"50%",background:"#FF9100",border:"1.5px solid #fff",verticalAlign:"middle"}}></span> Sismo M4+</span>
            {showHeatMap&&<span style={{display:"flex",alignItems:"center",gap:2}}><span style={{display:"inline-block",width:14,height:14,borderRadius:3,background:"linear-gradient(135deg,#4285F4,#4CAF50,#FFD600,#FF3B3B)",border:"1.5px solid #fff",verticalAlign:"middle"}}></span> Mapa de calor</span>}
          </div>
          <button onClick={()=>setShowHeatMap(!showHeatMap)} style={{background:showHeatMap?"#1A73E8":T.surface2,color:showHeatMap?"#fff":T.textMuted,border:showHeatMap?"none":`1px solid ${T.border}`,borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            🔥 {showHeatMap?"Ocultar calor":"Mapa de calor"}
          </button>
          {showHeatMap&&<select value={heatFilter} onChange={e=>setHeatFilter(e.target.value)} style={{background:T.surface2,color:T.text,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",cursor:"pointer",fontWeight:700,fontSize:11}}>
            <option value="todos">🔴 Todas las necesidades</option>
            <option value="agua">💧 Agua / Alimentos</option>
            <option value="comida">🍚 Comida / Ración</option>
            <option value="medicina">💊 Medicinas</option>
            <option value="refugio">🏕️ Refugio / Colchonetas</option>
            <option value="higiene">🧼 Higiene / Pañales</option>
            <option value="cobertura">📍 Cobertura general</option>
          </select>}
          <button onClick={usarGPS} disabled={gpsLoad} style={{background:userPos?"#0D3D1F":"#CF1A2F",color:userPos?"#4CAF50":"#fff",border:userPos?"1px solid #1A5C2A":"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            {gpsLoad?"🔍 Buscando...":userPos?"🔄 Actualizar":"👁️ Ver centros cercanos a mí"}
          </button>
        </div>
      </div>
      {gpsErr&&<div style={{background:"#FFEBEE",color:"#C62828",padding:"7px 16px",fontSize:12}}>⚠️ {gpsErr}</div>}
      <div style={{position:"relative"}}>
        {!mapLoaded&&<div style={{position:"absolute",inset:0,zIndex:500,background:T.surface2,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><div style={{width:32,height:32,border:"3px solid",borderColor:`${T.border} ${T.border} ${T.text} ${T.border}`,borderRadius:"50%",animation:"spin .8s linear infinite"}}/><div style={{fontSize:12,color:T.textMuted}}>Cargando mapa...</div><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>}
        <div ref={mapRef} style={{width:"100%",height:580}}/>
        {userPos&&<div style={{position:"absolute",top:10,right:10,zIndex:1000,background:"rgba(13,61,31,.92)",color:"#4CAF50",borderRadius:7,padding:"5px 11px",fontSize:11,fontWeight:700}}>📍 Ubicación activa</div>}
      </div>
      {cercanos.length>0&&(
        <div style={{background:T.surface,borderTop:`1px solid ${T.border}`,padding:"12px 16px"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#4CAF50",marginBottom:10}}>📍 {cercanos.length} centros más cercanos a ti</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8}}>
            {cercanos.map((c,i)=>{
              const crit=Object.values(c.necesidades||{}).filter(v=>v==="CRÍTICO").length;
              const mc=i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":T.border;
              return(
                <div key={c.id} onClick={()=>{onPinClick(c);flyTo(c);}} style={{background:c.id===pinActivoId?(T===T_DARK?"#2A0A0F":"#FFF5F5"):T.surface2,border:`1.5px solid ${mc}`,borderRadius:10,padding:"9px 12px",cursor:"pointer",borderLeft:`4px solid ${mc}`,transition:"all .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
                  onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                  <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4}}>
                    <div style={{width:21,height:21,borderRadius:"50%",background:mc,color:i<3?"#111":"#fff",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:12,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</div>
                      <div style={{fontSize:10,color:T.textMuted}}>{c.ciudad}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:"#4285F4",fontWeight:700}}>📏 {c.dist.toFixed(1)} km</span>
                    {crit>0&&<span style={{fontSize:10,background:"#FEE2E2",color:"#DC2626",padding:"1px 5px",borderRadius:4,fontWeight:700}}>🔴 {crit}</span>}
                    {c.verificado&&<span style={{fontSize:10,color:"#4CAF50",fontWeight:600}}>?</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

}
async function firebaseLoad(path) {
