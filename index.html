function CertQR({value,size=140}){
  const svgRef=useRef(null);
  useEffect(()=>{
    if(!value||!svgRef.current)return;
    const draw=()=>{
      if(!window.QRCode||!svgRef.current)return;
      const qr=window.QRCode(0,"M");
      qr.addData(value);
      qr.make();
      const mod=qr.getModuleCount(),cell=size/mod;
      const p=[`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`];
      p.push(`<rect width="${size}" height="${size}" fill="#fff"/>`);
      for(let r=0;r<mod;r++)for(let c=0;c<mod;c++)if(qr.isDark(r,c))p.push(`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="#111"/>`);
      p.push("</svg>");
      svgRef.current.innerHTML=p.join("");
    };
    if(window.QRCode){draw();return;}
    const s=document.createElement("script");s.id="qr-gen";s.src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js";s.onload=draw;document.head.appendChild(s);
  },[value,size]);
  return(<div ref={svgRef} style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",background:"#fff",borderRadius:4}}/>);
}

function useLeaflet(mapRef,centros,refugios,userPos,pinActivoId,cercanoIds,onPin){
  const mapInst=useRef(null),mrkMap=useRef({}),userMrk=useRef(null),circRef=useRef(null),ready=useRef(false);
  const intervals=useRef([]);
  const firstUserPos=useRef(true);
  const cleanupIntervals=()=>{intervals.current.forEach(clearInterval);intervals.current=[];};
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const init=()=>{
      if(!window.L||!mapRef.current)return;
      try{
        const map=window.L.map(mapRef.current,{zoomControl:true,attributionControl:true}).setView([8.5,-66.5],6);
        window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
        mapInst.current=map;ready.current=true;
        setTimeout(()=>{try{map.invalidateSize();}catch(e){}},500);
      }catch(e){console.warn("Map init error:",e);}
    };
    cleanupIntervals();
    if(window.L){setTimeout(init,100);return;}
    if(!document.getElementById("lf-css")){const l=document.createElement("link");l.id="lf-css";l.rel="stylesheet";l.href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css";document.head.appendChild(l);}
    if(!document.getElementById("lf-js")){const s=document.createElement("script");s.id="lf-js";s.src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js";s.onload=()=>setTimeout(init,150);document.head.appendChild(s);}
    else{const id=setInterval(()=>{if(window.L){clearInterval(id);init();}},150);intervals.current.push(id);}
    return()=>{cleanupIntervals();if(mapInst.current){try{mapInst.current.remove();}catch(e){}mapInst.current=null;ready.current=false;}};
  },[]);

  useEffect(()=>{
    const draw=()=>{
      const map=mapInst.current,L=window.L;if(!map||!L)return;
      Object.values(mrkMap.current).forEach(m=>m.remove());mrkMap.current={};
      refugios.forEach(r=>{
        if(!r.lat||!r.lng)return;
        const icon=L.divIcon({className:"",html:`<div style="width:32px;height:32px;border-radius:4px;background:#4285F4;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:15px">🏕️</div>`,iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-18]});
        const popup=`<div style="font-family:Inter,sans-serif;min-width:200px;padding:4px 0"><div style="background:#1A73E8;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px;font-weight:700">🏕️ REFUGIO / ALBERGUE</div><div style="font-weight:800;font-size:13px;color:#111;margin-bottom:2px">${r.nombre}</div><div style="color:#555;font-size:11px;margin-bottom:5px">📍 ${r.ciudad}, ${r.estado}</div><div style="font-size:11px;color:#333">${r.direccion}</div>${r.tel&&r.tel!=="N/A"?`<div style="margin-top:5px;font-size:11px;color:#1A73E8">📞 ${r.tel}</div>`:""}<div style="margin-top:9px;display:flex;gap:5px"><a href="https://www.google.com/maps?q=${r.lat},${r.lng}&z=17" target="_blank" style="flex:1;text-align:center;background:#1A73E8;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">🗺️ Maps</a></div></div>`;
        const mrk=L.marker([r.lat,r.lng],{icon}).addTo(map).bindPopup(popup,{maxWidth:250});
        mrk.on("click",()=>{map.flyTo([r.lat,r.lng],15,{duration:1.1});});
        mrkMap.current[`R-${r.id}`]=mrk;
      });
      centros.forEach(c=>{
        if(!c.lat||!c.lng)return;
        const crit=Object.values(c.necesidades||{}).filter(v=>v==="CRÍTICO").length;
        const activo=c.id===pinActivoId,cercano=cercanoIds.includes(c.id);
        const color=crit>0?"#FF3B3B":c.verificado?"#4CAF50":"#FF8C00";
        const sz=activo?46:cercano?40:34;
        const ring=activo?"border:3px solid #fff;box-shadow:0 0 0 4px #CF1A2F,0 3px 14px rgba(0,0,0,.5);":cercano?"border:3px solid #FFD700;box-shadow:0 0 0 3px #FFD700,0 3px 10px rgba(0,0,0,.4);":"border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);";
        const emoji=crit>0?"🔴":c.verificado?"✅":"📦";
        const icon=L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};${ring}display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:${sz>38?17:13}px">${emoji}</span></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz],popupAnchor:[0,-sz-4]});
        const urg=Object.entries(c.necesidades||{}).filter(([,v])=>v==="CRÍTICO").map(([k])=>k).slice(0,3);
        const badge=cercano&&!activo?`<div style="background:#1A73E8;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px;font-weight:700">📍 Cercano a ti</div><br/>`:"";
        const popup=`<div style="font-family:Inter,sans-serif;min-width:220px;padding:4px 0">${badge}<div style="font-weight:800;font-size:14px;color:#111;margin-bottom:2px">${c.nombre}</div><div style="color:#666;font-size:11px;margin-bottom:5px">📍 ${c.ciudad}, ${c.estado}</div>${c.verificado?'<span style="background:#E8F5E9;color:#2E7D32;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">✓ Verificado</span>':'<span style="background:#FFF8E1;color:#F57F17;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">⏳ Pendiente</span>'}${urg.length?`<div style="margin-top:7px"><div style="font-size:10px;color:#999;margin-bottom:3px">Necesita urgente:</div>${urg.map(u=>`<span style="display:inline-block;background:#FFEBEE;color:#C62828;font-size:10px;padding:2px 6px;border-radius:4px;margin:1px;font-weight:600">🔴 ${u}</span>`).join("")}</div>`:""}<div style="margin-top:9px;display:flex;gap:5px"><a href="https://wa.me/${fmtWA(c.whatsapp)}" target="_blank" style="flex:1;text-align:center;background:#075E54;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">💬 WhatsApp</a><a href="https://www.google.com/maps?q=${c.lat},${c.lng}&z=17" target="_blank" style="flex:1;text-align:center;background:#1A73E8;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">🗺️ Maps</a></div></div>`;
        const mrk=L.marker([c.lat,c.lng],{icon,zIndexOffset:activo?2000:cercano?1000:0}).addTo(map).bindPopup(popup,{maxWidth:260});
        mrk.on("click",()=>onPin(c));mrkMap.current[c.id]=mrk;
      });
    };
    if(ready.current){draw();return;}
    const poll=()=>{if(ready.current){clearInterval(poll);draw();}};
    poll.i=setInterval(poll,200);intervals.current.push(poll.i);
    return()=>{if(poll.i)clearInterval(poll.i);};
  },[centros,refugios,pinActivoId,cercanoIds]);

  useEffect(()=>{
    const go=()=>{
      const map=mapInst.current,L=window.L;if(!map||!L||!userPos)return;
      userMrk.current?.remove();circRef.current?.remove();
      const icon=L.divIcon({className:"",html:`<div style="width:22px;height:22px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 0 0 5px rgba(66,133,244,.25)"></div>`,iconSize:[22,22],iconAnchor:[11,11]});
      userMrk.current=L.marker([userPos.lat,userPos.lng],{icon,zIndexOffset:3000}).addTo(map).bindPopup("<b style='font-family:Inter'>📍 Tu ubicación</b>").openPopup();
      circRef.current=L.circle([userPos.lat,userPos.lng],{radius:userPos.acc||800,color:"#4285F4",fillColor:"#4285F4",fillOpacity:0.07,weight:1}).addTo(map);
      if(firstUserPos.current){firstUserPos.current=false;map.flyTo([userPos.lat,userPos.lng],12,{duration:1.8});}
    };
    if(ready.current){go();return;}
    const poll=()=>{if(ready.current){clearInterval(poll);go();}};
    poll.i=setInterval(poll,200);intervals.current.push(poll.i);
    return()=>{if(poll.i)clearInterval(poll.i);};
  },[userPos]);

  const flyTo=(c)=>{const map=mapInst.current,L=window.L;if(!map||!L||!c.lat||!c.lng)return;map.flyTo([c.lat,c.lng],15,{duration:1.1});const key=mrkMap.current[c.id]?c.id:`R-${c.id}`;setTimeout(()=>mrkMap.current[key]?.openPopup(),1250);};
  return{flyTo,mapInst};
}

  const si={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"};
  return(
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 16px",marginBottom:14,boxShadow:T.cardShadow}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:10,alignItems:"flex-end"}}>
        <div style={{position:"relative"}}>
          <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.3}}>🏙️ Ciudad o Estado</label>
          <input value={busqCiudad} onChange={e=>onChange(e.target.value)} onBlur={()=>setTimeout(()=>setShowSugs(false),150)} placeholder="Ej: Caracas, La Guaira, Zulia..." style={si}/>
          {showSugs&&sugs.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,zIndex:100,boxShadow:"0 4px 12px rgba(0,0,0,.15)",overflow:"hidden",marginTop:2}}>
              {sugs.map(c=><div key={c} onMouseDown={()=>{setBusqCiudad(c);setShowSugs(false);}} style={{padding:"8px 12px",cursor:"pointer",fontSize:13,color:T.text,display:"flex",alignItems:"center",gap:6}} onMouseEnter={e=>e.currentTarget.style.background=T.surface2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><span style={{color:"#CF1A2F"}}>📍</span>{c}</div>)}
            </div>
          )}
        </div>
        <div>
          <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.3}}>🔍 Nombre del centro</label>

        {pinActivo&&<span style={{color:"#CF1A2F",marginLeft:8,fontWeight:600}}>· 📍 {pinActivo.nombre}</span>}
      </div>
    </div>
  );
}

function MapaPrincipal({centros,refugios,pinActivoId,onPinClick,mapaRef,T}){
  const mapRef=useRef(null);
  const [userPos,setUserPos]=useState(null);
  const [cercanos,setCercanos]=useState([]);
  const [gpsLoad,setGpsLoad]=useState(false);
  const [gpsErr,setGpsErr]=useState("");
  const [mapLoaded,setMapLoaded]=useState(false);
  useEffect(()=>{
    if(!mapRef.current)return;
    const checkMap=()=>{if(mapRef.current?.querySelector(".leaflet-container")){setMapLoaded(true);return true;}return false;};
    if(checkMap())return;
    const o=new MutationObserver(()=>{if(checkMap())o.disconnect();});
    o.observe(mapRef.current,{childList:true,subtree:true});
    const fallback=setTimeout(()=>{setMapLoaded(true);},4000);
    return()=>{o.disconnect();clearTimeout(fallback);};
  },[]);
  const cercanoIds=cercanos.map(c=>c.id);
  const {flyTo}=useLeaflet(mapRef,centros,refugios,userPos,pinActivoId,cercanoIds,onPinClick);
  useEffect(()=>{if(mapaRef)mapaRef.current={flyTo};},[flyTo]);

  const usarGPS=()=>{
    setGpsLoad(true);setGpsErr("");setCercanos([]);
    if(!navigator.geolocation){setGpsErr("Sin soporte GPS.");setGpsLoad(false);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{const{latitude:la,longitude:lo,accuracy:acc}=pos.coords;setUserPos({lat:la,lng:lo,acc});const ord=centros.filter(c=>c.lat&&c.lng).map(c=>({...c,dist:distKm(la,lo,c.lat,c.lng)})).sort((a,b)=>a.dist-b.dist).slice(0,5);setCercanos(ord);setGpsLoad(false);},
      ()=>{setGpsErr("No se pudo obtener ubicación.");setGpsLoad(false);},
      {timeout:12000,enableHighAccuracy:true}
    );
  };

  return(
    <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${T.border}`,boxShadow:"0 4px 20px rgba(0,0,0,.1)",marginBottom:22}}>
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <span style={{fontWeight:700,fontSize:14,color:T.text}}>🗺️ Mapa de Centros de Acopio y Refugios</span>
          <div style={{fontSize:10,color:T.textMuted,marginTop:1}}>
            <span style={{marginRight:10}}>📦 {centros.length} centros de acopio</span>
            <span>🏕️ {refugios.length} refugios/albergues</span>
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",background:T.surface2,borderRadius:8,padding:"5px 10px",border:`1px solid ${T.border}`,fontSize:10,color:T.textMuted,flexWrap:"wrap"}}>
            {[["🔴","Crítico"],["✅","Verificado"],["🏕️","Refugio"],["⭐","Cercano"]].map(([ic,lb])=>(
              <span key={lb} style={{display:"flex",alignItems:"center",gap:2}}>{ic} {lb}</span>
            ))}
          </div>
          <button onClick={usarGPS} disabled={gpsLoad} style={{background:userPos?"#0D3D1F":"#CF1A2F",color:userPos?"#4CAF50":"#fff",border:userPos?"1px solid #1A5C2A":"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            {gpsLoad?"⏳ Buscando...":userPos?"📡 Actualizar":"📡 Ver centros cercanos a mí"}
          </button>
        </div>
      </div>
      {gpsErr&&<div style={{background:"#FFEBEE",color:"#C62828",padding:"7px 16px",fontSize:12}}>⚠️ {gpsErr}</div>}
      <div style={{position:"relative"}}>

    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:T.bg,minHeight:"100vh",color:T.text,fontSize:14,transition:"background .3s,color .3s"}}>
      <div style={{position:"relative",overflow:"hidden",minHeight:110}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,#0D47A1,#1565C0,#1E88E5,#42A5F5)"}}/>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)"}}/>
        <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",opacity:.13,pointerEvents:"none",fontSize:140,lineHeight:1}}>🇻🇪</div>
        <div style={{position:"relative",zIndex:2,maxWidth:1280,margin:"0 auto",padding:"14px 20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <span style={{fontSize:44,filter:"drop-shadow(0 2px 4px rgba(0,0,0,.4))"}}>🇻🇪</span>
              <div>
                <div style={{fontWeight:900,fontSize:20,color:"#fff",lineHeight:1.1,textShadow:"0 2px 8px rgba(0,0,0,.5)"}}>Red Nacional de Centros de Acopio</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.85)",marginTop:3,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>Emergencia Sísmica Venezuela · Terremotos 7.2 y 7.5 · 24 de junio de 2026</div>
              </div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{fontSize:12,background:"rgba(255,60,60,.35)",border:"1px solid rgba(255,100,100,.5)",color:"#FFB0B0",padding:"4px 12px",borderRadius:20,backdropFilter:"blur(4px)"}}>🔴 EMERGENCIA ACTIVA · {new Date().toLocaleDateString("es-VE")}</div>
              <button title="Cambiar idioma" onClick={()=>setLang(l=>l==="es"?"en":"es")} style={{background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>{lang==="es"?"🌐 EN":"🌐 ES"}</button>
              <button title="Modo oscuro/claro" onClick={()=>setDarkMode(d=>!d)} style={{background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontWeight:600,fontSize:12,backdropFilter:"blur(4px)"}}>{darkMode?"☀️":"🌙"}</button>
              <button title="Gestión de Voluntarios" onClick={()=>setShowVoluntarios(true)} style={{background:"rgba(76,175,80,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>{voluntarios.length} 👥</button>
              <button title="Control de Inventario" onClick={()=>setShowInventario(true)} style={{background:"rgba(255,140,0,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>📦 {inventario.length}</button>
              <button title="Analíticas y Gráficos" onClick={()=>setShowAnalytics(true)} style={{background:"rgba(156,39,176,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>📊</button>
              <button title="Exportar Datos" onClick={()=>setShowExportar(true)} style={{background:"rgba(33,150,243,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>📥</button>
              <button title="Registrar Centro de Acopio" onClick={()=>setRegistro(true)} style={{background:"#fff",color:"#CF1A2F",border:"none",borderRadius:8,padding:"7px 15px",cursor:"pointer",fontWeight:700,fontSize:12}}>+ Registrar Centro</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:12}}>
            {[["📦",centros.length,"Centros de Acopio","#FFD100"],["🏕️",refugios.length,"Refugios activos","#4FC3F7"],["🔴",totalCrit,"Alertas críticas","#FF8080"],["✅",`${verificados}/${centros.length}`,"Verificados","#81C784"]].map(([ic,v,lbl,color])=>(
              <div key={lbl} style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(4px)",borderRadius:10,padding:"9px 12px",borderBottom:`2px solid ${color}`}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,.65)",marginBottom:1}}>{ic} {lbl}</div>
                <div style={{fontWeight:800,fontSize:20,color:"#fff",textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"18px 20px"}}>
        {topCrit.length>0&&(
          <div style={{background:T.alertBg,border:`1px solid ${T.alertBorder}`,borderRadius:12,padding:"10px 16px",marginBottom:14}}>
            <div style={{fontWeight:700,color:T.alertText,fontSize:13,marginBottom:6}}>🚨 Insumos más urgentes en toda la red:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{topCrit.map(([ins,c])=><span key={ins} style={{background:T.critBg,color:T.critText,padding:"2px 9px",borderRadius:6,fontSize:12,fontWeight:600}}>{ins} <span style={{opacity:.75}}>({c.CRÍTICO} centros)</span></span>)}</div>
          </div>
        )}
        <PanelEmergencias T={T}/>
        <BarraBusqueda busqCiudad={busqCiudad} setBusqCiudad={setBusqCiudad} busqNombre={busqNombre} setBusqNombre={setBusqNombre} filtrados={filtrados.length} total={centros.length} pinActivo={pinActivo} T={T}/>
        <div id="mapa-id">
          <MapaPrincipal key="main-map" centros={filtrados.length>0?filtrados:centros} refugios={refugios} pinActivoId={pinActivo?.id} onPinClick={c=>setPinActivo(c)} mapaRef={mapaRef} T={T}/>
        </div>
        <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>📋 Centros de Acopio Registrados</span>
          <span style={{fontSize:11,color:T.textMuted,fontWeight:400}}>Toca una tarjeta para verlo en el mapa 👆</span>
        </div>
        {filtrados.length===0
          ?<div style={{textAlign:"center",padding:"28px",color:T.textFaint,background:T.surface,borderRadius:12,marginBottom:14}}><div style={{fontSize:28,marginBottom:6}}>🔍</div><div>No se encontraron centros con esos criterios.</div></div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:9,marginBottom:18}}>{filtrados.map(c=><Tarjeta key={c.id} centro={c} activo={pinActivo?.id===c.id} T={T} onSeleccionar={seleccionarCentro} onVerDetalle={setDetalle} onCert={setCert}/>)}</div>
        }
        <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10}}>🏕️ Refugios y Albergues Verificados</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:9,marginBottom:20}}>
          {refugios.map(r=>(
            <div key={r.id} onClick={()=>seleccionarRefugio(r)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"11px 14px",boxShadow:T.cardShadow,borderLeft:"4px solid #1A73E8",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#1A73E8"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
              <div style={{display:"flex",gap:4,marginBottom:3}}><span style={{fontSize:10,background:"#E3F2FD",color:"#0D47A1",padding:"1px 6px",borderRadius:20}}>🏕️ Refugio</span>{r.verificado&&<span style={{fontSize:10,background:"#E8F5E9",color:"#2E7D32",padding:"1px 6px",borderRadius:20}}>✓ Verificado</span>}</div>
              <div style={{fontWeight:700,color:T.text,fontSize:13,marginBottom:1}}>{r.nombre}</div>
              <div style={{color:T.textMuted,fontSize:11,marginBottom:5}}>📍 {r.ciudad}, {r.estado}</div>
              <div style={{color:T.textFaint,fontSize:11,marginBottom:6}}>{r.direccion}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                {r.tel&&r.tel!=="N/A"&&<a href={`tel:${r.tel.replace(/\D/g,"")}`} onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:3,background:"#E8F5E9",color:"#1B5E20",border:"1px solid #A5D6A7",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>📞 {r.tel}</a>}
                <a href={`https://www.google.com/maps?q=${r.lat},${r.lng}&z=17`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:3,background:"#E3F2FD",color:"#0D47A1",border:"1px solid #90CAF9",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>🗺️ Maps</a>
                <span style={{fontSize:10,color:T.textMuted,marginLeft:"auto"}}>Ocup: {r.recibido}/{r.capacidad}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:"11px 14px",background:T.surface,border:`1px dashed ${T.border}`,borderRadius:12,textAlign:"center",cursor:"pointer",marginBottom:16}} onClick={()=>setRegistro(true)}><span style={{color:"#CF1A2F",fontWeight:700,fontSize:13}}>+ ¿Tu centro de acopio no aparece? Regístralo gratis →</span></div>
      </div>
      <div style={{borderTop:`1px solid ${T.border}`,padding:"12px 20px",background:T.surface}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:10,color:T.textFaint}}>Red Nacional de Centros de Acopio · Emergencia Sísmica Venezuela 2026<br/><a href="https://responsegrid.app" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4"}}>ResponseGrid</a> by <a href="https://globalemergency.online" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4"}}>Global Emergency</a> — CC BY-SA 4.0 · Mapa: OpenStreetMap</div>
          <div style={{display:"flex",gap:12,fontSize:11}}>
            <a href="https://panitasmap.org" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>PanitasMap</a>
            <a href="https://auxiliovenezuela.com" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>AuxilioVenezuela</a>
            <a href="https://centraldeayudavenezuela.com" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>Central de Ayuda</a>
          </div>
        </div>
      </div>
      {detalle&&<Detalle centro={detalle} onClose={()=>setDetalle(null)} onCert={c=>{setDetalle(null);setCert(c);}} T={T}/>}
      {registro&&<Registro centros={centros} onClose={()=>setRegistro(false)} onGuardar={c=>setCentros(p=>[...p,c])} T={T}/>}
      {cert&&<Certificado centro={cert} onClose={()=>setCert(null)}/>}
      {showLogin&&<LoginAdmin onLogin={()=>{setAdminOk(true);setShowLogin(false);setShowDash(true);}} onClose={()=>setShowLogin(false)} T={T}/>}
      {showDash&&adminOk&&<Dashboard centros={centros} refugios={refugios} onClose={()=>setShowDash(false)} T={T}/>}
      {showVoluntarios&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowVoluntarios(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#2E7D32,#4CAF50)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>👥 Gestión de Voluntarios</div>
              <button onClick={()=>setShowVoluntarios(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <VoluntariosPanel voluntarios={voluntarios} setVoluntarios={setVoluntarios} centros={centros} T={T}/>
            </div>
          </div>
        </div>
      )}
      {showInventario&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowInventario(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#E65100,#FF8C00)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>📦 Control de Inventario</div>
              <button onClick={()=>setShowInventario(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <InventarioPanel inventario={inventario} setInventario={setInventario} centros={centros} T={T}/>
            </div>
          </div>
        </div>
      )}
      {showExportar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowExportar(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:450,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#0D47A1,#1A73E8)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>📥 Exportar Datos</div>
              <button onClick={()=>setShowExportar(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <ExportarPanel centros={centros} voluntarios={voluntarios} inventario={inventario} T={T}/>
            </div>
          </div>
        </div>
      )}
      {showAnalytics&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowAnalytics(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#6A1B9A,#9C27B0)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>📊 Analíticas</div>
              <button onClick={()=>setShowAnalytics(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <AnalyticsPanel centros={centros} refugios={refugios} voluntarios={voluntarios} inventario={inventario} T={T}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
