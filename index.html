function CertQR({value,size=140}){
  const svgRef=useRef(null);
  useEffect(()=>{
    if(!value||!svgRef.current)return;
    const draw=()=>{
      if(!window.QRCode||!svgRef.current)return;
      const qr=window.QRCode(0,"M");
      qr.addData(value);
      qr.make();
      const mod=qr.getModuleCount(),cell=size/mod;
      const p=[`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`];
      p.push(`<rect width="${size}" height="${size}" fill="#fff"/>`);
      for(let r=0;r<mod;r++)for(let c=0;c<mod;c++)if(qr.isDark(r,c))p.push(`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="#111"/>`);
      p.push("</svg>");
      svgRef.current.innerHTML=p.join("");
    };
    if(window.QRCode){draw();return;}
    const s=document.createElement("script");s.id="qr-gen";s.src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js";s.onload=draw;document.head.appendChild(s);
  },[value,size]);
  return(<div ref={svgRef} style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",background:"#fff",borderRadius:4}}/>);
}

function useLeaflet(mapRef,centros,refugios,userPos,pinActivoId,cercanoIds,onPin){
  const mapInst=useRef(null),mrkMap=useRef({}),userMrk=useRef(null),circRef=useRef(null),ready=useRef(false);
  const intervals=useRef([]);
  const firstUserPos=useRef(true);
  const cleanupIntervals=()=>{intervals.current.forEach(clearInterval);intervals.current=[];};
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const init=()=>{
      if(!window.L||!mapRef.current)return;
      const map=window.L.map(mapRef.current,{zoomControl:true,attributionControl:true}).setView([8.5,-66.5],6);
      window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
      mapInst.current=map;ready.current=true;setTimeout(()=>map.invalidateSize(),300);
    };
    cleanupIntervals();
    if(window.L){setTimeout(init,50);return;}
    if(!document.getElementById("lf-css")){const l=document.createElement("link");l.id="lf-css";l.rel="stylesheet";l.href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css";document.head.appendChild(l);}
    if(!document.getElementById("lf-js")){const s=document.createElement("script");s.id="lf-js";s.src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js";s.onload=()=>setTimeout(init,80);document.head.appendChild(s);}
    else{const id=setInterval(()=>{if(window.L){clearInterval(id);init();}},100);intervals.current.push(id);}
    return()=>{cleanupIntervals();if(mapInst.current){mapInst.current.remove();mapInst.current=null;ready.current=false;}};
  },[]);

  useEffect(()=>{
    const draw=()=>{
      const map=mapInst.current,L=window.L;if(!map||!L)return;
      Object.values(mrkMap.current).forEach(m=>m.remove());mrkMap.current={};
      refugios.forEach(r=>{
        if(!r.lat||!r.lng)return;
        const icon=L.divIcon({className:"",html:`<div style="width:32px;height:32px;border-radius:4px;background:#4285F4;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:15px">🏕️</div>`,iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-18]});

        mrkMap.current[`R-${r.id}`]=L.marker([r.lat,r.lng],{icon}).addTo(map).bindPopup(popup,{maxWidth:250});
      });
      centros.forEach(c=>{
        if(!c.lat||!c.lng)return;
        const crit=Object.values(c.necesidades||{}).filter(v=>v==="CRÍTICO").length;

        const color=crit>0?"#FF3B3B":c.verificado?"#4CAF50":"#FF8C00";
        const sz=activo?46:cercano?40:34;
        const ring=activo?"border:3px solid #fff;box-shadow:0 0 0 4px #CF1A2F,0 3px 14px rgba(0,0,0,.5);":cercano?"border:3px solid #FFD700;box-shadow:0 0 0 3px #FFD700,0 3px 10px rgba(0,0,0,.4);":"border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);";
        const emoji=crit>0?"🔴":c.verificado?"✅":"📦";
        const icon=L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};${ring}display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:${sz>38?17:13}px">${emoji}</span></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz],popupAnchor:[0,-sz-4]});
        const urg=Object.entries(c.necesidades||{}).filter(([,v])=>v==="CRÍTICO").map(([k])=>k).slice(0,3);
        const badge=cercano&&!activo?`<div style="background:#1A73E8;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px;font-weight:700">📍 Cercano a ti</div><br/>`:"";
        const popup=`<div style="font-family:Inter,sans-serif;min-width:220px;padding:4px 0">${badge}<div style="font-weight:800;font-size:14px;color:#111;margin-bottom:2px">${c.nombre}</div><div style="color:#666;font-size:11px;margin-bottom:5px">📍 ${c.ciudad}, ${c.estado}</div>${c.verificado?'<span style="background:#E8F5E9;color:#2E7D32;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">✓ Verificado</span>':'<span style="background:#FFF8E1;color:#F57F17;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">⏳ Pendiente</span>'}${urg.length?`<div style="margin-top:7px"><div style="font-size:10px;color:#999;margin-bottom:3px">Necesita urgente:</div>${urg.map(u=>`<span style="display:inline-block;background:#FFEBEE;color:#C62828;font-size:10px;padding:2px 6px;border-radius:4px;margin:1px;font-weight:600">🔴 ${u}</span>`).join("")}</div>`:""}<div style="margin-top:9px;display:flex;gap:5px"><a href="https://wa.me/${fmtWA(c.whatsapp)}" target="_blank" style="flex:1;text-align:center;background:#075E54;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">💬 WhatsApp</a><a href="https://www.google.com/maps?q=${c.lat},${c.lng}&z=17" target="_blank" style="flex:1;text-align:center;background:#1A73E8;color:#fff;border-radius:5px;padding:6px 4px;font-size:11px;font-weight:700;text-decoration:none">🗺️ Maps</a></div></div>`;
        const mrk=L.marker([c.lat,c.lng],{icon,zIndexOffset:activo?2000:cercano?1000:0}).addTo(map).bindPopup(popup,{maxWidth:260});
        mrk.on("click",()=>onPin(c));mrkMap.current[c.id]=mrk;
      });
    };
    if(ready.current){draw();return;}
    const poll=()=>{if(ready.current){clearInterval(poll);draw();}};
    poll.i=setInterval(poll,200);intervals.current.push(poll.i);
    return()=>{if(poll.i)clearInterval(poll.i);};
  },[centros,refugios,pinActivoId,cercanoIds]);

  useEffect(()=>{
    const go=()=>{
      const map=mapInst.current,L=window.L;if(!map||!L||!userPos)return;
      userMrk.current?.remove();circRef.current?.remove();
      const icon=L.divIcon({className:"",html:`<div style="width:22px;height:22px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 0 0 5px rgba(66,133,244,.25)"></div>`,iconSize:[22,22],iconAnchor:[11,11]});
      userMrk.current=L.marker([userPos.lat,userPos.lng],{icon,zIndexOffset:3000}).addTo(map).bindPopup("<b style='font-family:Inter'>📍 Tu ubicación</b>").openPopup();
      circRef.current=L.circle([userPos.lat,userPos.lng],{radius:userPos.acc||800,color:"#4285F4",fillColor:"#4285F4",fillOpacity:0.07,weight:1}).addTo(map);
      if(firstUserPos.current){firstUserPos.current=false;map.flyTo([userPos.lat,userPos.lng],12,{duration:1.8});}
    };
    if(ready.current){go();return;}
    const poll=()=>{if(ready.current){clearInterval(poll);go();}};
    poll.i=setInterval(poll,200);intervals.current.push(poll.i);
    return()=>{if(poll.i)clearInterval(poll.i);};
  },[userPos]);

  const flyTo=(c)=>{const map=mapInst.current,L=window.L;if(!map||!L||!c.lat||!c.lng)return;map.flyTo([c.lat,c.lng],15,{duration:1.1});const key=mrkMap.current[c.id]?c.id:`R-${c.id}`;setTimeout(()=>mrkMap.current[key]?.openPopup(),1250);};
  return{flyTo,mapInst};
}

function MapaPrincipal({centros,refugios,pinActivoId,onPinClick,mapaRef,T}){
  const mapRef=useRef(null);
  const [userPos,setUserPos]=useState(null);
  const [cercanos,setCercanos]=useState([]);
  const [gpsLoad,setGpsLoad]=useState(false);
  const [gpsErr,setGpsErr]=useState("");
  const [mapLoaded,setMapLoaded]=useState(false);
  useEffect(()=>{if(!mapRef.current)return;const o=new MutationObserver(()=>{if(mapRef.current?.querySelector(".leaflet-container")){setMapLoaded(true);o.disconnect();}});o.observe(mapRef.current,{childList:true,subtree:true});return()=>o.disconnect();},[]);
  const cercanoIds=cercanos.map(c=>c.id);
  const {flyTo}=useLeaflet(mapRef,centros,refugios,userPos,pinActivoId,cercanoIds,onPinClick);
  useEffect(()=>{if(mapaRef)mapaRef.current={flyTo};},[flyTo]);

  const usarGPS=()=>{
    setGpsLoad(true);setGpsErr("");setCercanos([]);
    if(!navigator.geolocation){setGpsErr("Sin soporte GPS.");setGpsLoad(false);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{const{latitude:la,longitude:lo,accuracy:acc}=pos.coords;setUserPos({lat:la,lng:lo,acc});const ord=centros.filter(c=>c.lat&&c.lng).map(c=>({...c,dist:distKm(la,lo,c.lat,c.lng)})).sort((a,b)=>a.dist-b.dist).slice(0,5);setCercanos(ord);setGpsLoad(false);},
      ()=>{setGpsErr("No se pudo obtener ubicación.");setGpsLoad(false);},
      {timeout:12000,enableHighAccuracy:true}
    );
  };

  return(
    <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${T.border}`,boxShadow:"0 4px 20px rgba(0,0,0,.1)",marginBottom:22}}>
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <span style={{fontWeight:700,fontSize:14,color:T.text}}>🗺️ Mapa de Centros de Acopio y Refugios</span>
          <div style={{fontSize:10,color:T.textMuted,marginTop:1}}>
            <span style={{marginRight:10}}>📦 {centros.length} centros de acopio</span>
            <span>🏕️ {refugios.length} refugios/albergues</span>
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",background:T.surface2,borderRadius:8,padding:"5px 10px",border:`1px solid ${T.border}`,fontSize:10,color:T.textMuted,flexWrap:"wrap"}}>
            {[["🔴","Crítico"],["✅","Verificado"],["🏕️","Refugio"],["⭐","Cercano"]].map(([ic,lb])=>(
              <span key={lb} style={{display:"flex",alignItems:"center",gap:2}}>{ic} {lb}</span>
            ))}
          </div>
          <button onClick={usarGPS} disabled={gpsLoad} style={{background:userPos?"#0D3D1F":"#CF1A2F",color:userPos?"#4CAF50":"#fff",border:userPos?"1px solid #1A5C2A":"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            {gpsLoad?"⏳ Buscando...":userPos?"📡 Actualizar":"📡 Ver centros cercanos a mí"}
          </button>
        </div>
      </div>
      {gpsErr&&<div style={{background:"#FFEBEE",color:"#C62828",padding:"7px 16px",fontSize:12}}>⚠️ {gpsErr}</div>}
      <div style={{position:"relative"}}>
        {!mapLoaded&&<div style={{position:"absolute",inset:0,zIndex:500,background:T.surface2,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><div style={{width:32,height:32,border:"3px solid",borderColor:`${T.border} ${T.border} ${T.text} ${T.border}`,borderRadius:"50%",animation:"spin .8s linear infinite"}}/><div style={{fontSize:12,color:T.textMuted}}>Cargando mapa...</div><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>}
        <div ref={mapRef} style={{width:"100%",height:580}}/>
        {userPos&&<div style={{position:"absolute",top:10,right:10,zIndex:1000,background:"rgba(13,61,31,.92)",color:"#4CAF50",borderRadius:7,padding:"5px 11px",fontSize:11,fontWeight:700}}>📡 Ubicación activa</div>}
      </div>
      {cercanos.length>0&&(

          <div style={{fontWeight:700,fontSize:13,color:"#4CAF50",marginBottom:10}}>📡 {cercanos.length} centros más cercanos a ti</div>

              return(

                    {c.verificado&&<span style={{fontSize:10,color:"#4CAF50",fontWeight:600}}>✓</span>}
                  </div>

            })}
          </div>
        </div>
      )}
    </div>
  );

    const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Reporte Red de Acopio Venezuela</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{padding:30px;color:#1a1a1a}h1{color:#8B0000;font-size:22px;margin-bottom:4px}h2{color:#CF1A2F;font-size:15px;margin:20px 0 8px}p{color:#666;font-size:12px;margin-bottom:16px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.stat{background:#F4F6FB;border:1px solid #DDE3EE;border-radius:8px;padding:12px;text-align:center}.stat-val{font-size:22px;font-weight:800;color:#8B0000}.stat-lbl{font-size:10px;color:#6B7280;margin-top:2px}table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px}th{background:#8B0000;color:#fff;padding:6px 8px;text-align:left}td{padding:5px 8px;border-bottom:1px solid #eee}.crit{margin:12px 0}.crit-item{display:inline-block;background:#FEE2E2;color:#C62828;padding:3px 8px;border-radius:4px;font-size:11px;margin:2px;font-weight:600}footer{margin-top:30px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#aaa;text-align:center}@media print{body{padding:20px}}</style></head><body><h1>🇻🇪 Red Nacional de Centros de Acopio</h1><p>Emergencia Sísmica Venezuela · 24 de junio de 2026 · Reporte generado: ${fecha}</p><div class="stats"><div class="stat"><div class="stat-val">${centros.length}</div><div class="stat-lbl">Centros de Acopio</div></div><div class="stat"><div class="stat-val">${refugios.length}</div><div class="stat-lbl">Refugios/Albergues</div></div><div class="stat"><div class="stat-val">${totalCrit}</div><div class="stat-lbl">Alertas Críticas</div></div><div class="stat"><div class="stat-val">${verificados}/${centros.length}</div><div class="stat-lbl">Verificados</div></div></div><h2>📊 Insumos con Demanda Crítica</h2><div class="crit">${topInsumos.map(([ins,n])=>`<span class="crit-item">🔴 ${ins} (${n} centros)</span>`).join("")}</div><h2>📦 Centros de Acopio</h2><table><thead><tr><th>ID</th><th>Nombre</th><th>Estado</th><th>Ciudad</th><th>Tipo</th><th>Donac./Cap.</th><th>Insumos Críticos</th><th>Verificado</th></tr></thead><tbody>${filas}</tbody></table><h2>🏕️ Refugios y Albergues</h2><table><thead><tr><th>ID</th><th>Nombre</th><th>Estado</th><th>Ciudad</th><th>Tipo</th><th>Ocup./Cap.</th><th>Teléfono</th><th>Verificado</th></tr></thead><tbody>${filasRefugios}</tbody></table><footer>Sistema Nacional de Acopio · Emergencia Sísmica Venezuela 2026 · Datos sujetos a actualización constante</footer></body></html>`;
    const iframe=document.createElement("iframe");iframe.style.cssText="position:fixed;top:0;left:0;width:0;height:0;border:none;";document.body.appendChild(iframe);
    const w=iframe.contentWindow;w.document.write(html);w.document.close();
    setTimeout(()=>{w.print();setTimeout(()=>document.body.removeChild(iframe),500);},500);
  };

  return(

          <div style={{display:"flex",gap:8}}>
            <button onClick={imprimirPDF} style={{background:"#CF1A2F",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:700,fontSize:12}}>🖨️ Imprimir Reporte PDF</button>
            <button onClick={onClose} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:18}}>×</button>
          </div>

        <div style={{padding:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
            {[["📦",centros.length,"Centros de Acopio","#CF1A2F"],["🏕️",refugios.length,"Refugios","#1A73E8"],["🔴",totalCrit,"Alertas Críticas","#FF3B3B"],["✅",`${verificados}/${centros.length}`,"Verificados","#4CAF50"],].map(([ic,v,lbl,color])=>(
              <div key={lbl} style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px",textAlign:"center",borderBottom:`3px solid ${color}`}}>
                <div style={{fontSize:24,marginBottom:2}}>{ic}</div>
                <div style={{fontWeight:900,fontSize:24,color:color}}>{v}</div>

              <div style={{height:8,background:T.border,borderRadius:4,marginBottom:8}}>

                  <div style={{flex:1,height:5,background:T.border,borderRadius:4}}>

          <div style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,padding:14,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:10}}>🚨 Insumos con Mayor Demanda Crítica</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
              {topInsumos.map(([ins,n])=>(

          <div style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>

              <button onClick={imprimirPDF} style={{background:"#CF1A2F",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontWeight:700,fontSize:11}}>🖨️ Imprimir</button>
            </div>
            <div style={{overflow:"auto",maxHeight:280}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{background:T.surface,position:"sticky",top:0}}>
                  {["ID","Centro","Estado","Ciudad","Tipo","Donac./Cap.","Críticos","Verif."].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,color:T.textMuted,borderBottom:`1px solid ${T.border}`}}>{h}</th>)}
                </tr></thead>
                <tbody>{centros.map((c,i)=>{
                  const crit=Object.entries(c.necesidades||{}).filter(([,v])=>v==="CRÍTICO").length;
                  return(<tr key={c.id} style={{background:i%2===0?T.surface2:T.surface}}>
                    <td style={{padding:"7px 10px",color:T.textMuted,fontFamily:"monospace"}}>{c.id}</td>
                    <td style={{padding:"7px 10px",color:T.text,fontWeight:600,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</td>
                    <td style={{padding:"7px 10px",color:T.textMuted}}>{c.estado}</td>
                    <td style={{padding:"7px 10px",color:T.textMuted}}>{c.ciudad}</td>

                    <td style={{padding:"7px 10px",color:T.text}}>{c.recibido}/{c.capacidad}</td>
                    <td style={{padding:"7px 10px"}}>{crit>0?<span style={{color:"#DC2626",fontWeight:700}}>🔴 {crit}</span>:<span style={{color:"#4CAF50"}}>✓ OK</span>}</td>
                    <td style={{padding:"7px 10px"}}>{c.verificado?<span style={{color:"#4CAF50",fontWeight:700}}>✓</span>:<span style={{color:"#F59E0B"}}>⏳</span>}</td>
                  </tr>);
                })}</tbody>

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function LoginAdmin({onLogin,onClose,T}){
  const [pass,setPass]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const intentar=async()=>{setLoading(true);setErr("");try{const h=await hashPass(pass);if(h===HASHED_ADMIN_PASS){onLogin();}else{setErr("Contraseña incorrecta.");setPass("");}}catch{setErr("Error de verificación.");}setLoading(false);};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={onClose}><div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,width:"100%",maxWidth:360,padding:0,overflow:"hidden"}} onClick={e=>e.stopPropagation()}><div style={{background:"linear-gradient(135deg,#0D1A3D,#1A73E8)",padding:"18px 22px",textAlign:"center"}}><div style={{fontSize:32,marginBottom:4}}>🔐</div><div style={{fontWeight:800,fontSize:16,color:"#fff"}}>Acceso Administrador</div><div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginTop:2}}>Sistema Nacional de Acopio Venezuela</div></div><div style={{padding:"20px 22px"}}><label style={{color:T.textMuted,fontSize:12,display:"block",marginBottom:6,fontWeight:600}}>Contraseña de acceso</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&intentar()} placeholder="Ingresa la contraseña..." autoFocus style={{width:"100%",background:T.inputBg,border:`1px solid ${err?"#FF3B3B":T.border}`,borderRadius:8,padding:"10px 12px",color:T.text,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:6}}/>{err&&<div style={{color:"#DC2626",fontSize:12,marginBottom:10}}>{err}</div>}<button onClick={intentar} disabled={loading} style={{width:"100%",background:loading?"#666":"#1A73E8",color:"#fff",border:"none",borderRadius:8,padding:"11px",cursor:loading?"wait":"pointer",fontWeight:700,fontSize:14,marginBottom:8}}>{loading?"⏳ Verificando...":"Entrar al Dashboard"}</button><button onClick={onClose} style={{width:"100%",background:"none",color:T.textMuted,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px",cursor:"pointer",fontSize:13}}>Cancelar</button><div style={{marginTop:10,fontSize:10,color:T.textFaint,textAlign:"center"}}>💡 Contacta al administrador para obtener acceso</div></div></div></div>);
}

function App(){
  const [darkMode,setDarkMode]=useState(true);
  const T=darkMode?T_DARK:T_LIGHT;
  const [centros,setCentros]=useState(()=>{
    try{const d=localStorage.getItem("acopio_centros");return d?JSON.parse(d):CENTROS_INIT;}catch{return CENTROS_INIT;}
  });
  useEffect(()=>{try{localStorage.setItem("acopio_centros",JSON.stringify(centros));}catch{}},[centros]);
  const [refugios]=useState(REFUGIOS);
  const [pinActivo,setPinActivo]=useState(null);
  const [busqCiudad,setBusqCiudad]=useState("");
  const [busqNombre,setBusqNombre]=useState("");
  const [detalle,setDetalle]=useState(null);
  const [registro,setRegistro]=useState(false);
  const [cert,setCert]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [showDash,setShowDash]=useState(false);
  const [adminOk,setAdminOk]=useState(false);
  const mapaRef=useRef({flyTo:null});

  const filtrados=centros.filter(c=>{
    if(busqCiudad&&!c.ciudad.toLowerCase().includes(busqCiudad.toLowerCase())&&!c.estado.toLowerCase().includes(busqCiudad.toLowerCase()))return false;
    if(busqNombre&&!c.nombre.toLowerCase().includes(busqNombre.toLowerCase()))return false;
    return true;
  });

  const seleccionarCentro=(c)=>{setPinActivo(c);if(mapaRef.current?.flyTo)mapaRef.current.flyTo(c);document.getElementById("mapa-id")?.scrollIntoView({behavior:"smooth",block:"start"});};
  const totalCrit=centros.reduce((a,c)=>a+Object.values(c.necesidades||{}).filter(v=>v==="CRÍTICO").length,0);
  const totalRecibido=centros.reduce((a,c)=>a+c.recibido,0);
  const verificados=centros.filter(c=>c.verificado).length;
  const contador={};centros.forEach(c=>Object.entries(c.necesidades||{}).forEach(([k,v])=>{if(!contador[k])contador[k]={CRÍTICO:0};if(v==="CRÍTICO")contador[k].CRÍTICO++;}));
  const topCrit=Object.entries(contador).filter(([,v])=>v.CRÍTICO>0).sort((a,b)=>b[1].CRÍTICO-a[1].CRÍTICO).slice(0,5);

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:T.bg,minHeight:"100vh",color:T.text,fontSize:14,transition:"background .3s,color .3s"}}>

          <div style={{flex:1,background:"#003DA5"}}/>

        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.52)"}}/>

            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <span style={{fontSize:44,filter:"drop-shadow(0 2px 4px rgba(0,0,0,.4))"}}>🇻🇪</span>

                <div style={{fontSize:12,color:"rgba(255,255,255,.85)",marginTop:3,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>Emergencia Sísmica Venezuela · Terremotos 7.2 y 7.5 · 24 de junio de 2026</div>
              </div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>

              <button onClick={()=>setDarkMode(d=>!d)} style={{background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontWeight:600,fontSize:12,backdropFilter:"blur(4px)"}}>{darkMode?"☀️ Claro":"🌙 Oscuro"}</button>

              <div style={{fontWeight:700,color:T.text,fontSize:13,marginBottom:1}}>{r.nombre}</div>
              <div style={{color:T.textMuted,fontSize:11,marginBottom:5}}>📍 {r.ciudad}, {r.estado}</div>
              <div style={{color:T.textFaint,fontSize:11,marginBottom:6}}>{r.direccion}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                {r.tel&&r.tel!=="Coordinación ONU"&&<a href={`tel:${r.tel.replace(/\D/g,"")}`} style={{display:"flex",alignItems:"center",gap:3,background:"#E8F5E9",color:"#1B5E20",border:"1px solid #A5D6A7",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>📞 {r.tel}</a>}
                <a href={`https://www.google.com/maps?q=${r.lat},${r.lng}&z=17`} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:3,background:"#E3F2FD",color:"#0D47A1",border:"1px solid #90CAF9",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>🗺️ Maps</a>
                <span style={{fontSize:10,color:T.textMuted,marginLeft:"auto"}}>Ocup: {r.recibido}/{r.capacidad}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:"11px 14px",background:T.surface,border:`1px dashed ${T.border}`,borderRadius:12,textAlign:"center",cursor:"pointer",marginBottom:16}} onClick={()=>setRegistro(true)}><span style={{color:"#CF1A2F",fontWeight:700,fontSize:13}}>+ ¿Tu centro de acopio no aparece? Regístralo gratis →</span></div>
      </div>
      <div style={{borderTop:`1px solid ${T.border}`,padding:"12px 20px",background:T.surface}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:11,color:T.textFaint}}>Red Nacional de Centros de Acopio · Emergencia Sísmica Venezuela 2026 · Mapa: OpenStreetMap</div>
          <div style={{display:"flex",gap:12,fontSize:11}}>
            <a href="https://panitasmap.org" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>PanitasMap</a>
            <a href="https://auxiliovenezuela.com" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>AuxilioVenezuela</a>
            <a href="https://centraldeayudavenezuela.com" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>Central de Ayuda</a>
          </div>
        </div>
      </div>
      {detalle&&<Detalle centro={detalle} onClose={()=>setDetalle(null)} onCert={c=>{setDetalle(null);setCert(c);}} T={T}/>}
      {registro&&<Registro centros={centros} onClose={()=>setRegistro(false)} onGuardar={c=>setCentros(p=>[...p,c])} T={T}/>}
      {cert&&<Certificado centro={cert} onClose={()=>setCert(null)}/>}
      {showLogin&&<LoginAdmin onLogin={()=>{setAdminOk(true);setShowLogin(false);setShowDash(true);}} onClose={()=>setShowLogin(false)} T={T}/>}
      {showDash&&adminOk&&<Dashboard centros={centros} refugios={refugios} onClose={()=>setShowDash(false)} T={T}/>}
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
