        <label style={{color:T.textMuted,fontSize:12,display:"block",marginBottom:5,fontWeight:600}}>🔒 Contraseña</label>
        <div style={{position:"relative"}}>
          <input type={showPass?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&intentar()} placeholder="Ingresa tu contraseña" style={{width:"100%",background:T.inputBg,border:`1px solid ${err?"#FF3B3B":T.border}`,borderRadius:8,padding:"10px 36px 10px 12px",color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          <span onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:16,opacity:.6}}>{showPass?"👁️‍🗨️":"👁️"}</span>
        </div>
        {err&&<div style={{color:"#DC2626",fontSize:12,marginBottom:10,marginTop:6}}>⚠ {err}</div>}
        <button onClick={intentar} disabled={loading||!user||!pass} style={{width:"100%",marginTop:10,background:loading||!user||!pass?"#999":"#1A73E8",color:"#fff",border:"none",borderRadius:8,padding:"11px",cursor:loading?"wait":"pointer",fontWeight:700,fontSize:14,transition:"background .2s"}}>{loading?"⏳ Entrando...":"🚀 Entrar al Panel"}</button>
      </div>
    </div>
  </div>);
}

function DashboardCentro({centro,onClose,T,addToast,saveFirebase,darkMode,toggleTheme}){
  const [seccion,setSeccion]=useState("inicio");
  const [filtroCategoria,setFiltroCategoria]=useState("todos");
  const [invLocal,setInvLocal]=useState(centro.inventario||[]);
  const [movimientos,setMovimientos]=useState(centro.movimientos||[]);
  const [chatMsgs,setChatMsgs]=useState([]);
  const [chatInput,setChatInput]=useState("");
  const [eventos,setEventos]=useState(centro.eventos||[]);
  const [nuevoEvento,setNuevoEvento]=useState({titulo:"",fecha:"",descripcion:"",tipo:"acopio"});
  const [showEventoForm,setShowEventoForm]=useState(false);
  const [alertas,setAlertas]=useState([]);
  const necesita=Object.entries(centro.necesidades||{}).filter(([,v])=>v==="CRÍTICO"||v==="ALTO");

  const CATEGORIAS=["Alimentos","Agua","Medicina","Higiene","Ropa","Cobijas","Útiles","Electrónica","Otros"];
  const coloresCat={Alimentos:"#FF9800",Agua:"#2196F3",Medicina:"#F44336",Higiene:"#9C27B0",Ropa:"#E91E63",Cobijas:"#795548",Útiles:"#607D8B",Electrónica:"#00BCD4",Otros:"#9E9E9E"};
  const TRANSPORT_ICONS={camion:"🚚",furgoneta:"🚐",moto:"🏍️",automovil:"🚗",pie:"🚶",otro:"📦"};

  useEffect(()=>{
    const inv=centro.inventario||[];
    const alerts=[];
    inv.forEach(i=>{
      if(i.cantidad<=i.minimo)alerts.push({tipo:"inventario",msg:`⚠️ ${i.nombre}: ${i.cantidad} ${i.unidad} (mínimo: ${i.minimo})`,ts:Date.now()});
      if(i.vencimiento){const d=new Date(i.vencimiento);const hoy=new Date();const dias=Math.ceil((d-hoy)/(1000*60*60*24));if(dias<=30&&dias>=0)alerts.push({tipo:"vencimiento",msg:`⏰ ${i.nombre} vence en ${dias} días (${i.vencimiento})`,ts:Date.now()});if(dias<0)alerts.push({tipo:"vencido",msg:`❌ ${i.nombre} VENCIDO (${i.vencimiento})`,ts:Date.now()});}
    });
    necesita.forEach(([k])=>{alerts.push({tipo:"necesidad",msg:`🔴 Necesidad crítica: ${k}`,ts:Date.now()});});
    setAlertas(alerts);
  },[centro]);

  const totalInv=invLocal.reduce((a,i)=>a+(i.cantidad||0),0);
  const criticos=invLocal.filter(i=>i.cantidad<=i.minimo).length;
  const recibidos=movimientos.filter(m=>m.tipo==="recepcion").reduce((a,m)=>a+m.cantidad,0);
  const enviados=movimientos.filter(m=>m.tipo==="envio").reduce((a,m)=>a+m.cantidad,0);

  const addInv=(item)=>{
    const nuevo=[...invLocal,{id:Date.now(),...item,cantidad:Number(item.cantidad),minimo:Number(item.minimo)||0}];
    setInvLocal(nuevo);
    saveFirebase(`acopio/centros/${centro.id}/inventario`,nuevo);
    addToast("Insumo agregado al inventario","success");
  };
  const removeInv=(id)=>{
    const nuevo=invLocal.filter(i=>i.id!==id);
    setInvLocal(nuevo);
    saveFirebase(`acopio/centros/${centro.id}/inventario`,nuevo);
    addToast("Insumo eliminado","info");
  };
  const updateInv=(id,newCant)=>{
    const nuevo=invLocal.map(i=>i.id===id?{...i,cantidad:Math.max(0,newCant)}:i);
    setInvLocal(nuevo);
    saveFirebase(`acopio/centros/${centro.id}/inventario`,nuevo);
  };
  const addMov=(mov)=>{
    const nuevo=[...movimientos,{id:Date.now(),...mov,fecha:new Date().toLocaleDateString("es-VE"),hora:new Date().toLocaleTimeString("es-VE",{hour:"2-digit",minute:"2-digit"})}];
    setMovimientos(nuevo);
    saveFirebase(`acopio/centros/${centro.id}/movimientos`,nuevo);
    addToast(mov.tipo==="recepcion"?"Recepción registrada":"Envío registrado","success");
  };
  const sendChat=()=>{
    if(!chatInput.trim())return;
    const msg={id:Date.now(),autor:centro.nombre,texto:chatInput,fecha:new Date().toLocaleTimeString("es-VE",{hour:"2-digit",minute:"2-digit"}),centroId:centro.id};
    const nuevo=[...chatMsgs,msg];
    setChatMsgs(nuevo);
    setChatInput("");
    saveFirebase("acopio/chat",nuevo);
  };
  const addEvento=()=>{
    if(!nuevoEvento.titulo||!nuevoEvento.fecha)return;
    const nuevo=[...eventos,{id:Date.now(),...nuevoEvento,creadoPor:centro.nombre}];
    setEventos(nuevo);
    saveFirebase(`acopio/centros/${centro.id}/eventos`,nuevo);
    setNuevoEvento({titulo:"",fecha:"",descripcion:"",tipo:"acopio"});
    setShowEventoForm(false);
    addToast("Evento creado","success");
  };
  const removeEvento=(id)=>{
    const nuevo=eventos.filter(e=>e.id!==id);
    setEventos(nuevo);
    saveFirebase(`acopio/centros/${centro.id}/eventos`,nuevo);
  };

  const exportPDF=()=>{
    let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Inventario - ${centro.nombre}</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{padding:30px;color:#1a1a1a}h1{color:#0D47A1;font-size:20px;margin-bottom:4px}p{color:#666;font-size:12px;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px}th{background:#0D47A1;color:#fff;padding:8px;text-align:left}td{padding:6px 8px;border-bottom:1px solid #eee}footer{margin-top:30px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#aaa;text-align:center}</style></head><body><h1>📋 Inventario: ${centro.nombre}</h1><p>ID: ${centro.id} · Generado: ${new Date().toLocaleDateString("es-VE")} ${new Date().toLocaleTimeString("es-VE")}</p><table><thead><tr><th>Categoría</th><th>Insumo</th><th>Cantidad</th><th>Unidad</th><th>Mínimo</th><th>Lote</th><th>Vence</th><th>Estado</th></tr></thead><tbody>`;
    invLocal.forEach(i=>{
      let estado="OK";
      if(i.cantidad<=i.minimo)estado="Crítico";
      else if(i.vencimiento){const d=Math.ceil((new Date(i.vencimiento)-new Date())/(864e5));if(d<0)estado="Vencido";else if(d<=30)estado="Por vencer";}
      html+=`<tr><td>${i.categoria||"-"}</td><td><b>${i.nombre}</b></td><td>${i.cantidad}</td><td>${i.unidad}</td><td>${i.minimo}</td><td>${i.lote||"-"}</td><td>${i.vencimiento||"-"}</td><td>${estado}</td></tr>`;
    });
    html+=`</tbody></table><h2>📊 Resumen</h2><p>Total: ${invLocal.length} insumos · ${totalInv} unidades · ${criticos} críticos</p><footer>Sistema Nacional de Acopio Venezuela</footer></body></html>`;
    const w=window.open("","_blank");w.document.write(html);w.document.close();w.print();
  };

  const exportExcel=()=>{
    let csv="Categoría,Insumo,Cantidad,Unidad,Mínimo,Lote,Fecha Vencimiento,Estado\n";
    invLocal.forEach(i=>{csv+=`"${i.categoria||"Sin cat."}","${i.nombre}",${i.cantidad},"${i.unidad}",${i.minimo},"${i.lote||"-"}","${i.vencimiento||"-"}","${i.cantidad<=i.minimo?"Crítico":"OK"}"\n`;});
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`inventario_${centro.id}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  const invFiltrada=filtroCategoria==="todos"?invLocal:invLocal.filter(i=>i.categoria===filtroCategoria);

  const sideItems=[
    ["inicio","📊","Inicio"],
    ["inventario","📦","Inventario"],
    ["movimientos","🚚","Envíos/Recepción"],
    ["alertas","🔔",`Alertas (${alertas.length})`],
    ["chat","💬","Chat"],
    ["calendario","📅","Calendario"],
    ["reportes","📄","Reportes"]
  ];

  return(<div style={{position:"fixed",inset:0,zIndex:4000,display:"flex",background:T.bg}}>
    <div style={{width:220,background:T.surface,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"16px",borderBottom:`1px solid ${T.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <img src={LOGO_B64} style={{width:32,height:32,borderRadius:6}}/>
          <div>
            <div style={{fontWeight:700,fontSize:12,color:T.text,lineHeight:1.2}}>Panel Centro</div>
            <div style={{fontSize:10,color:T.textMuted}}>{centro.nombre}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:T.textFaint,textAlign:"center"}}>ID: {centro.id}</div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:"8px"}}>
        {sideItems.map(([key,icon,label])=>(
          <div key={key} onClick={()=>setSeccion(key)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,cursor:"pointer",marginBottom:2,background:seccion===key?(T===T_DARK?"#1A73E822":"#E3F2FD"):"none",color:seccion===key?"#1A73E8":T.text,fontWeight:seccion===key?700:400,fontSize:12,transition:"all .15s"}}>
            <span style={{fontSize:15}}>{icon}</span>{label}
          </div>
        ))}
      </div>
      <div style={{padding:"12px",borderTop:`1px solid ${T.border}`}}>
        <button onClick={toggleTheme} style={{width:"100%",background:T.surface2,border:`1px solid ${T.border}`,color:T.text,borderRadius:8,padding:"8px",cursor:"pointer",fontSize:11,fontWeight:600,marginBottom:6}}>{darkMode?"☀️ Tema Claro":"🌙 Tema Oscuro"}</button>
        <button onClick={()=>{onClose();window.scrollTo({top:0,behavior:"smooth"});}} style={{width:"100%",background:"#1A73E8",border:"none",color:"#fff",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:11,fontWeight:600,marginBottom:6}}>🌐 Volver a la Web</button>
        <button onClick={onClose} style={{width:"100%",background:"none",border:`1px solid ${T.border}`,color:T.textMuted,borderRadius:8,padding:"8px",cursor:"pointer",fontSize:11,fontWeight:600}}>🚪 Cerrar Panel</button>
      </div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:"20px"}}>
      {seccion==="inicio"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>📊 Panel de {centro.nombre}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
          {[["📦",totalInv,"Insumos","FFD100"],["🔴",criticos,"Críticos","FF8080"],["📥",recibidos,"Recibidos","4CAF50"],["📤",enviados,"Enviados","2196F3"]].map(([ic,v,lbl,col])=>(
            <div key={lbl} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px",borderTop:`3px solid ${col}`}}>
              <div style={{fontSize:11,color:T.textMuted}}>{ic} {lbl}</div>
              <div style={{fontWeight:800,fontSize:24,color:T.text,marginTop:4}}>{v}</div>
            </div>
          ))}
        </div>
        {alertas.length>0&&<div style={{background:T.alertBg,border:`1px solid ${T.alertBorder}`,borderRadius:10,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,color:T.alertText,marginBottom:8}}>🔔 Alertas Activas ({alertas.length})</div>
          {alertas.map((a,i)=><div key={i} style={{fontSize:12,color:T.alertText,padding:"4px 0"}}>{a.msg}</div>)}
        </div>}
        {necesita.length>0&&<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:8}}>🔴 Necesidades Críticas</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {necesita.map(([k])=><span key={k} style={{background:T.critBg,color:T.critText,padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700}}>⚠ {k}</span>)}
          </div>
        </div>}
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px"}}>
          <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:8}}>📋 Últimos Movimientos</div>
          {movimientos.slice(-5).reverse().map(m=>(
            <div key={m.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}>
              <span style={{color:m.tipo==="recepcion"?"#4CAF50":"#FF5722",fontWeight:700}}>{m.tipo==="recepcion"?"📥":"📤"} {m.insumo}</span>
              <span style={{color:T.textMuted}}>{m.cantidad} uds · {m.fecha}</span>
            </div>
          ))}
          {movimientos.length===0&&<div style={{color:T.textFaint,fontSize:12,textAlign:"center",padding:12}}>Sin movimientos aún</div>}
        </div>
      </div>}
      {seccion==="inventario"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:800,fontSize:18,color:T.text}}>📦 Inventario</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={exportPDF} style={{background:"#F44336",color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontWeight:700,fontSize:11}}>📄 PDF</button>
            <button onClick={exportExcel} style={{background:"#4CAF50",color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontWeight:700,fontSize:11}}>📊 Excel</button>
            <button onClick={()=>setSeccion("addInv")} style={{background:"#1A73E8",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>+ Agregar</button>
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          <button onClick={()=>setFiltroCategoria("todos")} style={{background:filtroCategoria==="todos"?"#1A73E8":T.surface2,color:filtroCategoria==="todos"?"#fff":T.text,border:`1px solid ${filtroCategoria==="todos"?"#1A73E8":T.border}`,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>Todos ({invLocal.length})</button>
          {CATEGORIAS.map(c=>{const count=invLocal.filter(i=>i.categoria===c).length;if(count===0)return null;return<button key={c} onClick={()=>setFiltroCategoria(c)} style={{background:filtroCategoria===c?(coloresCat[c]||"#999"):T.surface2,color:filtroCategoria===c?"#fff":T.text,border:`1px solid ${filtroCategoria===c?(coloresCat[c]||"#999"):T.border}`,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>{c} ({count})</button>;})}
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{background:T.surface2}}>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Categoría</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Insumo</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>Cantidad</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>Mínimo</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>Lote</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>Vence</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>Estado</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>🗑</th>
            </tr></thead>
            <tbody>
              {invFiltrada.map(i=>(
                <tr key={i.id} style={{borderBottom:`1px solid ${T.border}`}}>
                  <td style={{padding:"6px 10px"}}><span style={{background:(coloresCat[i.categoria]||"#9E9E9E")+"22",color:coloresCat[i.categoria]||"#9E9E9E",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>{i.categoria||"-"}</span></td>
                  <td style={{padding:"6px 10px",color:T.text,fontWeight:600}}>{i.nombre}</td>
                  <td style={{padding:"6px 10px",textAlign:"center",color:T.text}}>{i.cantidad} {i.unidad}</td>
                  <td style={{padding:"6px 10px",textAlign:"center",color:T.textMuted}}>{i.minimo}</td>
                  <td style={{padding:"6px 10px",textAlign:"center",color:T.textMuted,fontSize:10}}>{i.lote||"-"}</td>
                  <td style={{padding:"6px 10px",textAlign:"center",color:i.vencimiento&&new Date(i.vencimiento)<new Date()?"#F44336":T.textMuted,fontSize:10}}>{i.vencimiento||"-"}</td>
                  <td style={{padding:"6px 10px",textAlign:"center"}}>{i.cantidad<=i.minimo?<span style={{color:"#FF3B3B",fontWeight:700,fontSize:10}}>⚠ Crítico</span>:<span style={{color:"#4CAF50",fontSize:10}}>✓ OK</span>}</td>
                  <td style={{padding:"6px 10px",textAlign:"center"}}><button onClick={()=>removeInv(i.id)} style={{background:"#FFEBEE",color:"#D32F2F",border:"none",borderRadius:5,padding:"3px 6px",cursor:"pointer",fontSize:10}}>🗑</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          {invFiltrada.length===0&&<div style={{color:T.textFaint,fontSize:12,textAlign:"center",padding:20}}>Sin insumos en esta categoría</div>}
        </div>
      </div>}
      {seccion==="addInv"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>➕ Agregar Insumo</div>
        <AddInvForm onAdd={addInv} onBack={()=>setSeccion("inventario")} T={T}/>
      </div>}
      {seccion==="movimientos"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>🚚 Envíos y Recepciones</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <button onClick={()=>setSeccion("addMovR")} style={{background:"#4CAF50",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>📥 Registrar Recepción</button>
          <button onClick={()=>setSeccion("addMovE")} style={{background:"#FF5722",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>📤 Registrar Envío</button>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:T.surface2}}>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Fecha</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Tipo</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Cat.</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Insumo</th>
              <th style={{padding:"8px 10px",textAlign:"center",color:T.textMuted,fontWeight:700}}>Cant.</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>{movimientos.length>0&&movimientos[0].tipo==="recepcion"?"Remitente":"Destino"}</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Recibido/Entregado</th>
              <th style={{padding:"8px 10px",textAlign:"left",color:T.textMuted,fontWeight:700}}>Transporte</th>
            </tr></thead>
            <tbody>
              {movimientos.slice().reverse().map(m=>(
                <tr key={m.id} style={{borderBottom:`1px solid ${T.border}`}}>
                  <td style={{padding:"6px 10px",color:T.textMuted,fontSize:11}}>{m.fecha}<br/><span style={{fontSize:9}}>{m.hora||""}</span></td>
                  <td style={{padding:"6px 10px"}}><span style={{background:m.tipo==="recepcion"?"#E8F5E9":"#FBE9E7",color:m.tipo==="recepcion"?"#2E7D32":"#D84315",padding:"2px 6px",borderRadius:4,fontWeight:700,fontSize:10}}>{m.tipo==="recepcion"?"📥":"📤"}</span></td>
                  <td style={{padding:"6px 10px"}}><span style={{background:T.surface2,padding:"2px 6px",borderRadius:4,fontSize:10}}>{m.categoria||"-"}</span></td>
                  <td style={{padding:"6px 10px",color:T.text,fontWeight:600,fontSize:12}}>{m.insumo}</td>
                  <td style={{padding:"6px 10px",textAlign:"center",color:T.text,fontSize:12}}>{m.cantidad}</td>
                  <td style={{padding:"6px 10px",color:T.textMuted,fontSize:11}}>{m.origen||m.destino||m.origenDestino||"-"}{m.remitenteNombre&&<br/>}<span style={{fontSize:9}}>{m.remitenteNombre||""}</span></td>
                  <td style={{padding:"6px 10px",color:T.textMuted,fontSize:11}}>{m.recibidoPor||"-"}</td>
                  <td style={{padding:"6px 10px",color:T.textMuted,fontSize:10}}>{m.transporte?`${TRANSPORT_ICONS[m.transporte.tipo]||"📦"} ${m.transporte.placa||""}${m.transporte.conductor?" · "+m.transporte.conductor:""}`:"-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {movimientos.length===0&&<div style={{color:T.textFaint,fontSize:12,textAlign:"center",padding:20}}>Sin movimientos registrados</div>}
        </div>
      </div>}
      {seccion==="addMovR"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>📥 Registrar Recepción</div>
        <AddMovForm tipo="recepcion" onAdd={addMov} onBack={()=>setSeccion("movimientos")} T={T} invLocal={invLocal} updateInv={updateInv}/>
      </div>}
      {seccion==="addMovE"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>📤 Registrar Envío</div>
        <AddMovForm tipo="envio" onAdd={addMov} onBack={()=>setSeccion("movimientos")} T={T} invLocal={invLocal} updateInv={updateInv}/>
      </div>}
      {seccion==="alertas"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>🔔 Alertas del Centro</div>
        {alertas.length===0?<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:30,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:8}}>✅</div>
          <div style={{color:T.textMuted,fontSize:13}}>Sin alertas activas</div>
        </div>:<div style={{display:"grid",gap:8}}>
          {alertas.map((a,i)=>(
            <div key={i} style={{background:a.tipo==="inventario"?"#FFF3E0":"#FBE9E7",border:`1px solid ${a.tipo==="inventario"?"#FFB74D":"#FF8A65"}`,borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{a.tipo==="inventario"?"📦":"🔴"}</span>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:T.text}}>{a.msg}</div>
                <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>Detectado: {new Date(a.ts).toLocaleTimeString("es-VE")}</div>
              </div>
            </div>
          ))}
        </div>}
      </div>}
      {seccion==="chat"&&<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 40px)"}}>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:12}}>💬 Chat entre Centros</div>
        <div style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflow:"auto",padding:12}}>
            {chatMsgs.map(m=>(
              <div key={m.id} style={{marginBottom:10,display:m.centroId===centro.id?"flex-end":"flex"}}>
                <div style={{maxWidth:"75%",background:m.centroId===centro.id?"#1A73E8":T.surface2,color:m.centroId===centro.id?"#fff":T.text,padding:"8px 12px",borderRadius:10,borderTopRightRadius:m.centroId===centro.id?2:10,borderTopLeftRadius:m.centroId===centro.id?10:2}}>
                  {m.centroId!==centro.id&&<div style={{fontSize:10,fontWeight:700,marginBottom:2,color:T.accent}}>{m.autor}</div>}
                  <div style={{fontSize:13}}>{m.texto}</div>
                  <div style={{fontSize:9,opacity:.6,textAlign:"right",marginTop:3}}>{m.fecha}</div>
                </div>
              </div>
            ))}
            {chatMsgs.length===0&&<div style={{color:T.textFaint,fontSize:12,textAlign:"center",padding:40}}>💬 Inicia la conversación con otros centros</div>}
          </div>
          <div style={{display:"flex",gap:8,padding:10,borderTop:`1px solid ${T.border}`}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Escribe un mensaje..." style={{flex:1,background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.text,fontSize:13,outline:"none"}}/>
            <button onClick={sendChat} disabled={!chatInput.trim()} style={{background:chatInput.trim()?"#1A73E8":"#999",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:chatInput.trim()?"pointer":"not-allowed",fontWeight:700,fontSize:12}}>Enviar</button>
          </div>
        </div>
      </div>}
      {seccion==="calendario"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:18,color:T.text}}>📅 Calendario de Eventos</div>
          <button onClick={()=>setShowEventoForm(!showEventoForm)} style={{background:"#1A73E8",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>{showEventoForm?"✕ Cancelar":"+ Nuevo Evento"}</button>
        </div>
        {showEventoForm&&<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"16px",marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:3,fontWeight:600}}>Título *</label><input value={nuevoEvento.titulo} onChange={e=>setNuevoEvento({...nuevoEvento,titulo:e.target.value})} placeholder="Ej: Jornada de acopio" style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 10px",color:T.text,fontSize:12,outline:"none",boxSizing:"border-box"}}/></div>
            <div><label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:3,fontWeight:600}}>Fecha *</label><input type="date" value={nuevoEvento.fecha} onChange={e=>setNuevoEvento({...nuevoEvento,fecha:e.target.value})} style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 10px",color:T.text,fontSize:12,outline:"none",boxSizing:"border-box"}}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10}}>
            <div><label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:3,fontWeight:600}}>Descripción</label><input value={nuevoEvento.descripcion} onChange={e=>setNuevoEvento({...nuevoEvento,descripcion:e.target.value})} placeholder="Detalles del evento" style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 10px",color:T.text,fontSize:12,outline:"none",boxSizing:"border-box"}}/></div>
            <div><label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:3,fontWeight:600}}>Tipo</label><select value={nuevoEvento.tipo} onChange={e=>setNuevoEvento({...nuevoEvento,tipo:e.target.value})} style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"7px 10px",color:T.text,fontSize:12,outline:"none"}}><option value="acopio">📦 Acopio</option><option value="distribucion">📤 Distribución</option><option value="jornada">👷 Jornada</option><option value="reunion">🤝 Reunión</option></select></div>
          </div>
          <button onClick={addEvento} disabled={!nuevoEvento.titulo||!nuevoEvento.fecha} style={{width:"100%",marginTop:10,background:nuevoEvento.titulo&&nuevoEvento.fecha?"#1A73E8":"#999",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:nuevoEvento.titulo&&nuevoEvento.fecha?"pointer":"not-allowed",fontWeight:700,fontSize:12}}>✅ Crear Evento</button>
        </div>}
        <div style={{display:"grid",gap:8}}>
          {eventos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha)).map(ev=>{
            const tipoCol={acopio:"#1A73E8",distribucion:"#FF5722",jornada:"#FF9800",reunion:"#9C27B0"};
            return(
              <div key={ev.id} style={{background:T.surface,border:`1px solid ${T.border}`,borderLeft:`4px solid ${tipoCol[ev.tipo]||"#999"}`,borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:T.text}}>{ev.titulo}</div>
                  <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>📅 {ev.fecha} {ev.descripcion&&`· ${ev.descripcion}`}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>Por: {ev.creadoPor}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{background:tipoCol[ev.tipo]+"22",color:tipoCol[ev.tipo],padding:"3px 8px",borderRadius:5,fontSize:10,fontWeight:700}}>{ev.tipo}</span>
                  <button onClick={()=>removeEvento(ev.id)} style={{background:"#FFEBEE",color:"#D32F2F",border:"none",borderRadius:5,padding:"4px 8px",cursor:"pointer",fontSize:11}}>🗑</button>
                </div>
              </div>
            );
          })}
          {eventos.length===0&&<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:30,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:8}}>📅</div>
            <div style={{color:T.textMuted,fontSize:13}}>Sin eventos programados</div>
          </div>}
        </div>
      </div>}
      {seccion==="reportes"&&<div>
        <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:16}}>📄 Reportes e Informes</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div onClick={exportPDF} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"20px",cursor:"pointer",textAlign:"center",transition:"all .15s"}} onMouseOver={e=>e.currentTarget.style.borderColor="#F44336"} onMouseOut={e=>e.currentTarget.style.borderColor=T.border}>
            <div style={{fontSize:40,marginBottom:8}}>📄</div>
            <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:4}}>Exportar PDF</div>
            <div style={{fontSize:11,color:T.textMuted}}>Inventario completo en formato PDF listo para imprimir</div>
          </div>
          <div onClick={exportExcel} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"20px",cursor:"pointer",textAlign:"center",transition:"all .15s"}} onMouseOver={e=>e.currentTarget.style.borderColor="#4CAF50"} onMouseOut={e=>e.currentTarget.style.borderColor=T.border}>
            <div style={{fontSize:40,marginBottom:8}}>📊</div>
            <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:4}}>Exportar Excel</div>
            <div style={{fontSize:11,color:T.textMuted}}>Archivo CSV para abrir en Excel o Google Sheets</div>
          </div>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"16px",marginTop:16}}>
          <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:10}}>📊 Resumen del Inventario</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            <div style={{background:T.surface2,borderRadius:8,padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:10,color:T.textMuted}}>Total Insumos</div>
              <div style={{fontWeight:800,fontSize:20,color:T.text}}>{invLocal.length}</div>
            </div>
            <div style={{background:T.surface2,borderRadius:8,padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:10,color:T.textMuted}}>Total Unidades</div>
              <div style={{fontWeight:800,fontSize:20,color:T.text}}>{totalInv}</div>
            </div>
            <div style={{background:T.surface2,borderRadius:8,padding:"10px",textAlign:"center"}}>
              <div style={{fontSize:10,color:T.textMuted}}>Críticos</div>
              <div style={{fontWeight:800,fontSize:20,color:"#FF3B3B"}}>{criticos}</div>
            </div>
          </div>
          <div style={{marginTop:12}}>
            <div style={{fontWeight:600,fontSize:12,color:T.text,marginBottom:6}}>Por Categoría:</div>
            {CATEGORIAS.map(c=>{const items=invLocal.filter(i=>i.categoria===c);if(items.length===0)return null;const total=items.reduce((a,i)=>a+i.cantidad,0);return<div key={c} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}>
              <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,borderRadius:3,background:coloresCat[c]||"#999",display:"inline-block"}}></span>{c}</span>
              <span style={{color:T.textMuted}}>{items.length} insumos · {total} uds</span>
            </div>;})}
          </div>
        </div>
      </div>}
    </div>
  </div>);
}

function AddInvForm({onAdd,onBack,T}){
  const CATEGORIAS=["Alimentos","Agua","Medicina","Higiene","Ropa","Cobijas","Útiles","Electrónica","Otros"];
  const [form,setForm]=useState({nombre:"",cantidad:"",unidad:"kg",minimo:"",categoria:"Alimentos",lote:"",vencimiento:""});
  const s={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"};
  return(<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"20px",maxWidth:440}}>
    <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:14}}>📝 Datos del Insumo</div>
    {[["Nombre del insumo","nombre","text","Ej: Agua potable"],["Cantidad","cantidad","number","0"],["Mínimo alerta","minimo","number","0"],["Nro. Lote","lote","text","Ej: LOTE-2026-001"],["Fecha Vencimiento","vencimiento","date",""]].map(([lbl,key,type,ph])=>(
      <div key={key} style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:12,display:"block",marginBottom:4,fontWeight:600}}>{lbl}{key==="nombre"||key==="cantidad"?" *":""}</label>
        {type==="date"?<input type="date" value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} style={s}/>:
        <input type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} placeholder={`Ingresa ${lbl.toLowerCase()}`} style={s}/>}
      </div>
    ))}
    <div style={{marginBottom:10}}>
      <label style={{color:T.textMuted,fontSize:12,display:"block",marginBottom:4,fontWeight:600}}>Categoría</label>
      <select value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value})} style={s}>{CATEGORIAS.map(c=><option key={c} value={c}>{c}</option>)}</select>
    </div>
    <div style={{marginBottom:10}}>
      <label style={{color:T.textMuted,fontSize:12,display:"block",marginBottom:4,fontWeight:600}}>Unidad</label>
      <select value={form.unidad} onChange={e=>setForm({...form,unidad:e.target.value})} style={s}><option value="kg">Kilogramos</option><option value="unidades">Unidades</option><option value="litros">Litros</option><option value="cajas">Cajas</option><option value="bolsas">Bolsas</option><option value="paquetes">Paquetes</option></select>
    </div>
    <div style={{display:"flex",gap:8,marginTop:14}}>
      <button onClick={()=>onAdd(form)} disabled={!form.nombre||!form.cantidad} style={{flex:1,background:form.nombre&&form.cantidad?"#1A73E8":"#999",color:"#fff",border:"none",borderRadius:8,padding:"9px",cursor:form.nombre&&form.cantidad?"pointer":"not-allowed",fontWeight:700,fontSize:12}}>✅ Agregar</button>
      <button onClick={onBack} style={{flex:1,background:"none",border:`1px solid ${T.border}`,color:T.textMuted,borderRadius:8,padding:"9px",cursor:"pointer",fontSize:12}}>← Volver</button>
    </div>
  </div>);
}

function AddMovForm({tipo,onAdd,onBack,T,invLocal,updateInv}){
  const [form,setForm]=useState({insumo:"",cantidad:"",categoria:"Alimentos",origen:"",destino:"",recibidoPor:"",transporte:{tipo:"camion",placa:"",conductor:"",telefono:""}});
  const CATEGORIAS=["Alimentos","Agua","Medicina","Higiene","Ropa","Cobijas","Útiles","Electrónica","Otros"];
  const REMITENTES=["Particulares","Gobierno","ONG","Iglesia","Empresa","Cruz Roja","Alcaldía","Hospital","Otro"];
  const TRANSPORTES=["camion","furgoneta","moto","automovil","pie","otro"];
  const TRANSPORT_ICONS={camion:"🚚",furgoneta:"🚐",moto:"🏍️",automovil:"🚗",pie:"🚶",otro:"📦"};
  const s={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"};
  const col=tipo==="recepcion"?"#4CAF50":"#FF5722";
  const insumosCat=invLocal.filter(i=>i.categoria===form.categoria);
  const invItem=insumosCat.find(i=>i.nombre===form.insumo);
  const maxCant=tipo==="envio"&&invItem?invItem.cantidad:99999;
  const exceedMax=tipo==="envio"&&Number(form.cantidad)>maxCant;

  const handleSend=()=>{
    if(tipo==="envio"&&invItem){
      const nuevaCant=invItem.cantidad-Number(form.cantidad);
      updateInv(invItem.id,nuevaCant);
    }
    onAdd({...form,tipo,cantidad:Number(form.cantidad)});
  };

  return(<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"20px",maxWidth:480}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
      <span style={{fontSize:26}}>{tipo==="recepcion"?"📥":"📤"}</span>
      <div>
        <div style={{fontWeight:700,fontSize:15,color:col}}>{tipo==="recepcion"?"Recepción de Ayuda":"Envío de Ayuda"}</div>
        <div style={{fontSize:11,color:T.textMuted}}>{tipo==="recepcion"?"Registrar insumos recibidos":"Registrar insumos enviados"}</div>
      </div>
    </div>

    <div style={{fontWeight:700,fontSize:12,color:T.text,marginBottom:8,borderBottom:`1px solid ${T.border}`,paddingBottom:6}}>📦 Datos del Insumo</div>
    <div style={{marginBottom:10}}>
      <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Categoría *</label>
      <select value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value,insumo:""})} style={s}>{CATEGORIAS.map(c=><option key={c} value={c}>{c}</option>)}</select>
    </div>
    <div style={{marginBottom:10}}>
      <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Insumo *</label>
      {tipo==="envio"?<select value={form.insumo} onChange={e=>setForm({...form,insumo:e.target.value})} style={s}>
        <option value="">Seleccionar del inventario...</option>
        {insumosCat.map(i=><option key={i.id} value={i.nombre}>{i.nombre} (Disponible: {i.cantidad} {i.unidad})</option>)}
      </select>:<input value={form.insumo} onChange={e=>setForm({...form,insumo:e.target.value})} placeholder="Ej: Agua potable, medicinas" style={s}/>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
      <div>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Cantidad *</label>
        <input type="number" value={form.cantidad} onChange={e=>setForm({...form,cantidad:e.target.value})} placeholder="0" max={maxCant} style={{...s,borderColor:exceedMax?"#FF3B3B":T.border}}/>
        {tipo==="envio"&&invItem&&<div style={{fontSize:10,color:T.textFaint,marginTop:2}}>Disponible: {invItem.cantidad} {invItem.unidad}</div>}
      </div>
      <div>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Unidad</label>
        <select value={form.unidad||"unidades"} onChange={e=>setForm({...form,unidad:e.target.value})} style={s}><option value="kg">Kg</option><option value="unidades">Unidades</option><option value="litros">Litros</option><option value="cajas">Cajas</option><option value="bolsas">Bolsas</option></select>
      </div>
    </div>

    {tipo==="recepcion"&&<div>
      <div style={{fontWeight:700,fontSize:12,color:T.text,marginBottom:8,marginTop:14,borderBottom:`1px solid ${T.border}`,paddingBottom:6}}>👤 Datos de Recepción</div>
      <div style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Quién envía (Remitente) *</label>
        <select value={form.origen} onChange={e=>setForm({...form,origen:e.target.value})} style={s}><option value="">Seleccionar...</option>{REMITENTES.map(r=><option key={r} value={r}>{r}</option>)}</select>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Nombre del remitente / organización</label>
        <input value={form.remitenteNombre||""} onChange={e=>setForm({...form,remitenteNombre:e.target.value})} placeholder="Ej: Juan Pérez, Alcaldía de Caracas" style={s}/>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Recibido por *</label>
        <input value={form.recibidoPor} onChange={e=>setForm({...form,recibidoPor:e.target.value})} placeholder="Nombre de quien recibe" style={s}/>
      </div>
    </div>}

    {tipo==="envio"&&<div>
      <div style={{fontWeight:700,fontSize:12,color:T.text,marginBottom:8,marginTop:14,borderBottom:`1px solid ${T.border}`,paddingBottom:6}}>🚚 Datos del Envío</div>
      <div style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Destino (quién recibe) *</label>
        <input value={form.destino} onChange={e=>setForm({...form,destino:e.target.value})} placeholder="Ej: Centro X, Hospital Y" style={s}/>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Tipo de transporte</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {TRANSPORTES.map(t=>(
            <button key={t} onClick={()=>setForm({...form,transporte:{...form.transporte,tipo:t}})} style={{background:form.transporte.tipo===t?col:T.surface2,color:form.transporte.tipo===t?"#fff":T.text,border:`1px solid ${form.transporte.tipo===t?col:T.border}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>
              {TRANSPORT_ICONS[t]} {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div>
          <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Placa / Identificación</label>
          <input value={form.transporte.placa} onChange={e=>setForm({...form,transporte:{...form.transporte,placa:e.target.value}})} placeholder="Ej: ABC-123" style={s}/>
        </div>
        <div>
          <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Conductor / Responsable</label>
          <input value={form.transporte.conductor} onChange={e=>setForm({...form,transporte:{...form.transporte,conductor:e.target.value}})} placeholder="Nombre" style={s}/>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{color:T.textMuted,fontSize:11,display:"block",marginBottom:4,fontWeight:600}}>Teléfono del transportista</label>
        <input value={form.transporte.telefono} onChange={e=>setForm({...form,transporte:{...form.transporte,telefono:e.target.value}})} placeholder="Ej: 04121234567" style={s}/>
      </div>
    </div>}

    <div style={{display:"flex",gap:8,marginTop:16}}>
      <button onClick={handleSend} disabled={!form.insumo||!form.cantidad} style={{flex:1,background:form.insumo&&form.cantidad?col:"#999",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:form.insumo&&form.cantidad?"pointer":"not-allowed",fontWeight:700,fontSize:13}}>✅ {tipo==="recepcion"?"Registrar Recepción":"Registrar Envío"}</button>
      <button onClick={onBack} style={{flex:1,background:"none",border:`1px solid ${T.border}`,color:T.textMuted,borderRadius:8,padding:"10px",cursor:"pointer",fontSize:13}}>← Volver</button>
    </div>
  </div>);
}

function App(){
  const [themeMode,setThemeMode]=useState(()=>{try{return localStorage.getItem("acopio_theme")||"light";}catch{return "light";}});
  const [systemDark,setSystemDark]=useState(()=>window.matchMedia?.("(prefers-color-scheme:dark)").matches);
  useEffect(()=>{const mq=window.matchMedia?.("(prefers-color-scheme:dark)");if(!mq)return;const h=e=>setSystemDark(e.matches);mq.addEventListener?.("change",h);return()=>mq.removeEventListener?.("change",h);},[]);
  useEffect(()=>{try{localStorage.setItem("acopio_theme",themeMode);}catch{}},[themeMode]);
  useEffect(()=>{document.documentElement.style.transition="background .3s,color .3s";document.documentElement.style.background=T.bg;document.documentElement.style.color=T.text;},[T]);
  const darkMode=themeMode==="dark"||(themeMode==="system"&&systemDark);
  const T=darkMode?T_DARK:T_LIGHT;
  const [lang,setLang]=useState("es");
  currentLang=lang;
  const [centros,setCentros]=useState(()=>loadLocal("centros")||CENTROS_INIT);
  const [refugios]=useState(REFUGIOS);
  const [hospitales]=useState(HOSPITALES);
  const [voluntarios,setVoluntarios]=useState(()=>loadLocal("voluntarios")||[]);
  const [inventario,setInventario]=useState(()=>loadLocal("inventario")||[]);
  const [cargando,setCargando]=useState(true);
  const [loadError,setLoadError]=useState(null);
  const [toasts,setToasts]=useState([]);
  const addToast=(msg,type="info")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);};
  const removeToast=(id)=>setToasts(p=>p.filter(t=>t.id!==id));
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [forceOffline,setForceOffline]=useState(false);
  const effectiveOnline=isOnline&&!forceOffline;
  const [showVoluntarios,setShowVoluntarios]=useState(false);
  const [showInventario,setShowInventario]=useState(false);
  const [showAnalytics,setShowAnalytics]=useState(false);
  const [pinActivo,setPinActivo]=useState(null);
  const [busqCiudad,setBusqCiudad]=useState("");
  const [busqNombre,setBusqNombre]=useState("");
  const [detalle,setDetalle]=useState(null);
  const [registro,setRegistro]=useState(false);
  const [cert,setCert]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [showDash,setShowDash]=useState(false);
  const [adminOk,setAdminOk]=useState(false);
  const [showLoginCentro,setShowLoginCentro]=useState(false);
  const [dashCentro,setDashCentro]=useState(null);
  const [verMasRefugios,setVerMasRefugios]=useState(false);
  const [verMasHospitales,setVerMasHospitales]=useState(false);
  const [verMasCentros,setVerMasCentros]=useState(false);
  const [showHeatMap,setShowHeatMap]=useState(false);
  const [heatFilter,setHeatFilter]=useState("todos");
  const [filtroEstado,setFiltroEstado]=useState("");
  const [filtroNivel,setFiltroNivel]=useState("");
  const [filtroInsumo,setFiltroInsumo]=useState("");
  const [showFiltrosAvanzados,setShowFiltrosAvanzados]=useState(false);
  const mapaRef=useRef({flyTo:null});

  useEffect(()=>{if(window.location.search.includes("admin=true")){setShowLogin(true);window.history.replaceState({},'',window.location.pathname);}},[]);

  useEffect(()=>{
    const handleOnline=()=>{setIsOnline(true);addToast("Conexión restaurada. Sincronizando...","success");processPendingSync();};
    const handleOffline=()=>{setIsOnline(false);addToast("Sin conexión. Modo offline activado.","warning");};
    window.addEventListener("online",handleOnline);
    window.addEventListener("offline",handleOffline);
    return()=>{window.removeEventListener("online",handleOnline);window.removeEventListener("offline",handleOffline);};
  },[]);

  useEffect(()=>{
    const loadAll=async()=>{
      if(!effectiveOnline){
        const localCentros=loadLocal("centros");
        const localVol=loadLocal("voluntarios");
        const localInv=loadLocal("inventario");
        if(localCentros)setCentros(localCentros);
        if(localVol)setVoluntarios(localVol);
        if(localInv)setInventario(localInv);
        setLoadError("Modo offline. Usando datos locales guardados.");
        setCargando(false);
        return;
      }
      try{
        const centrosData=await firebaseLoad("acopio/centros");
        if(centrosData&&Array.isArray(centrosData)&&centrosData.length>0){setCentros(centrosData);saveLocal("centros",centrosData);}
      }catch(e){setLoadError("Error de conexión. Usando datos locales.");addToast("Error cargando centros","error");}
      try{
        const volData=await firebaseLoad("acopio/voluntarios");
        if(volData){setVoluntarios(volData);saveLocal("voluntarios",volData);}
      }catch(e){}
      try{
        const invData=await firebaseLoad("acopio/inventario");
        if(invData){setInventario(invData);saveLocal("inventario",invData);}
      }catch(e){}
      setCargando(false);
    };
    loadAll();
    firebaseListen("acopio/centros",data=>{if(data&&Array.isArray(data)){setCentros(data);saveLocal("centros",data);}});
    firebaseListen("acopio/voluntarios",data=>{if(data){setVoluntarios(data);saveLocal("voluntarios",data);}});
    firebaseListen("acopio/inventario",data=>{if(data){setInventario(data);saveLocal("inventario",data);}});
  },[effectiveOnline]);

  useEffect(()=>{if(!cargando){saveLocal("centros",centros);if(effectiveOnline){const ok=firebaseSave("acopio/centros",centros);if(!ok)queueSync("acopio/centros",centros);}else{queueSync("acopio/centros",centros);}}},[centros,cargando,effectiveOnline]);
  useEffect(()=>{if(!cargando){saveLocal("voluntarios",voluntarios);if(effectiveOnline){const ok=firebaseSave("acopio/voluntarios",voluntarios);if(!ok)queueSync("acopio/voluntarios",voluntarios);}else{queueSync("acopio/voluntarios",voluntarios);}}},[voluntarios,cargando,effectiveOnline]);
  useEffect(()=>{if(!cargando){saveLocal("inventario",inventario);if(effectiveOnline){const ok=firebaseSave("acopio/inventario",inventario);if(!ok)queueSync("acopio/inventario",inventario);}else{queueSync("acopio/inventario",inventario);}}},[inventario,cargando,effectiveOnline]);

  const filtrados=centros.filter(c=>{
    if(busqCiudad&&!c.ciudad.toLowerCase().includes(busqCiudad.toLowerCase())&&!c.estado.toLowerCase().includes(busqCiudad.toLowerCase()))return false;
    if(busqNombre&&!c.nombre.toLowerCase().includes(busqNombre.toLowerCase()))return false;
    if(filtroEstado&&c.estado!==filtroEstado)return false;
    if(filtroNivel){
      const vals=Object.values(c.necesidades||{});
      if(filtroNivel==="CRÍTICO"&&!vals.includes("CRÍTICO"))return false;
      if(filtroNivel==="ALTO"&&!vals.includes("ALTO")&&!vals.includes("CRÍTICO"))return false;
      if(filtroNivel==="SIN_CRITICOS"&&vals.includes("CRÍTICO"))return false;
    }
    if(filtroInsumo){
      const keys=Object.keys(c.necesidades||{});
      if(!keys.some(k=>k.toLowerCase().includes(filtroInsumo.toLowerCase())))return false;
    }
    return true;
  });
  const filtradosRef=refugios.filter(r=>{
    if(busqCiudad&&!r.city.toLowerCase().includes(busqCiudad.toLowerCase()))return false;
    if(busqNombre&&!r.name.toLowerCase().includes(busqNombre.toLowerCase()))return false;
    return true;
  });
  const filtradosHosp=hospitales.filter(h=>{
    if(busqCiudad&&!h.city.toLowerCase().includes(busqCiudad.toLowerCase())&&!h.state.toLowerCase().includes(busqCiudad.toLowerCase()))return false;
    if(busqNombre&&!h.name.toLowerCase().includes(busqNombre.toLowerCase()))return false;
    return true;
  });

  const seleccionarCentro=(c)=>{setPinActivo(c);if(mapaRef.current?.flyTo)mapaRef.current.flyTo(c);document.getElementById("mapa-id")?.scrollIntoView({behavior:"smooth",block:"start"});};
  const seleccionarRefugio=(r)=>{if(mapaRef.current?.flyTo)mapaRef.current.flyTo(r);document.getElementById("mapa-id")?.scrollIntoView({behavior:"smooth",block:"start"});};
  const totalCrit=centros.reduce((a,c)=>a+Object.values(c.necesidades||{}).filter(v=>v==="CRÍTICO").length,0);
  const totalRecibido=centros.reduce((a,c)=>a+c.recibido,0);
  const verificados=centros.filter(c=>c.verificado).length;
  const contador={};centros.forEach(c=>Object.entries(c.necesidades||{}).forEach(([k,v])=>{if(!contador[k])contador[k]={CRÍTICO:0};if(v==="CRÍTICO")contador[k].CRÍTICO++;}));
  const topCrit=Object.entries(contador).filter(([,v])=>v.CRÍTICO>0).sort((a,b)=>b[1].CRÍTICO-a[1].CRÍTICO).slice(0,5);

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:T.bg,minHeight:"100vh",color:T.text,fontSize:14,transition:"background .3s,color .3s"}}>
      {cargando&&<div style={{position:"fixed",inset:0,background:"linear-gradient(135deg,#0D47A1,#1565C0,#1E88E5,#42A5F5)",zIndex:5000,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
        <img src={LOGO_B64} style={{width:100,height:100,borderRadius:12,boxShadow:"0 4px 20px rgba(0,0,0,.3)"}}/>
        <div style={{color:"rgba(255,255,255,.8)",fontSize:12,marginTop:8}}>Cargando datos...</div>
      </div>}
      {!effectiveOnline&&!cargando&&<div style={{position:"fixed",top:0,left:0,right:0,zIndex:4000,background:"linear-gradient(135deg,#E65100,#FF8C00)",color:"#fff",padding:"8px 20px",fontSize:12,fontWeight:700,textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:16}}>📴</span>
        <span>Modo offline — Los cambios se guardarán localmente</span>
        {getLocalSyncTime()&&<span style={{opacity:.7,fontSize:10,marginLeft:8}}>Última sync: {new Date(getLocalSyncTime()).toLocaleString("es-VE")}</span>}
      </div>}
      {loadError&&!cargando&&<div style={{background:"#FFF3E0",border:"1px solid #FFB74D",borderRadius:10,padding:"10px 16px",margin:"12px 20px 0",maxWidth:1280,marginLeft:"auto",marginRight:"auto",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>⚠️</span>
        <span style={{color:"#E65100",fontSize:12,fontWeight:600}}>{loadError}</span>
        <button onClick={()=>setLoadError(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:"#E65100",fontSize:16}}>×</button>
      </div>}
      {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onClose={()=>removeToast(t.id)}/>)}
      <div style={{position:"relative",overflow:"hidden",minHeight:110}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,#0D47A1,#1565C0,#1E88E5,#42A5F5)"}}/>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)"}}/>
        <div style={{position:"relative",zIndex:2,maxWidth:1280,margin:"0 auto",padding:"14px 20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <img src={LOGO_B64} alt="Logo" style={{height:56,width:"auto",filter:"drop-shadow(0 2px 6px rgba(0,0,0,.4))",flexShrink:0}}/>
              <div>
                <div style={{fontWeight:900,fontSize:20,color:"#fff",lineHeight:1.1,textShadow:"0 2px 8px rgba(0,0,0,.5)"}}>Red Nacional de Centros de Acopio</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.85)",marginTop:3,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>Emergencia Sísmica Venezuela · {new Date().toLocaleDateString("es-VE",{day:"2-digit",month:"long",year:"numeric"})}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{fontSize:12,background:"rgba(255,60,60,.35)",border:"1px solid rgba(255,100,100,.5)",color:"#FFB0B0",padding:"4px 12px",borderRadius:20,backdropFilter:"blur(4px)"}}>🔴 EMERGENCIA ACTIVA · {new Date().toLocaleDateString("es-VE")}</div>
              <button title="Cambiar idioma" onClick={()=>setLang(l=>l==="es"?"en":"es")} style={{background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>{lang==="es"?"🌐 EN":"🌐 ES"}</button>
              <button title={themeMode==="dark"?"Modo claro":themeMode==="light"?"Modo sistema":"Modo oscuro"} onClick={()=>setThemeMode(m=>m==="dark"?"light":m==="light"?"system":"dark")} style={{background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontWeight:600,fontSize:12,backdropFilter:"blur(4px)",display:"flex",alignItems:"center",gap:4}}>{themeMode==="dark"?"🌙":themeMode==="light"?"☀️":"💻"} <span style={{fontSize:10}}>{themeMode==="dark"?"Oscuro":themeMode==="light"?"Claro":"Auto"}</span></button>
              <button title="Gestión de Voluntarios" onClick={()=>setShowVoluntarios(true)} style={{background:"rgba(76,175,80,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>{voluntarios.length} 👥</button>
              <button title="Control de Inventario" onClick={()=>setShowInventario(true)} style={{background:"rgba(255,140,0,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>📦 {inventario.length}</button>
              <button title="Analíticas y Gráficos" onClick={()=>setShowAnalytics(true)} style={{background:"rgba(156,39,176,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>📊</button>
              <button title="Gestión de Centros" onClick={()=>setShowLoginCentro(true)} style={{background:"rgba(33,150,243,.85)",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>🏢 Gestión</button>
              <button title={forceOffline?"Volver online":"Simular offline"} onClick={()=>setForceOffline(!forceOffline)} style={{background:forceOffline?"rgba(255,140,0,.9)":"rgba(255,255,255,.18)",color:"#fff",border:forceOffline?"none":"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:11,backdropFilter:"blur(4px)"}}>{forceOffline?"🟢 Online":"📴 Offline"}</button>
              <button title="Registrar Centro de Acopio" onClick={()=>setRegistro(true)} style={{background:"#fff",color:"#CF1A2F",border:"none",borderRadius:8,padding:"7px 15px",cursor:"pointer",fontWeight:700,fontSize:12}}>+ Registrar Centro</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginTop:12}}>
            {[["📦",centros.length,"Centros de Acopio","#FFD100","seccion-centros"],["🏕️",refugios.length,"Refugios activos","#4FC3F7","seccion-refugios"],["🏥",hospitales.length,"Hospitales","#4CAF50","seccion-hospitales"],["🔴",totalCrit,"Alertas críticas","#FF8080","seccion-alertas"],["✅",`${verificados}/${centros.length}`,"Verificados","#81C784","seccion-centros"]].map(([ic,v,lbl,color,id])=>(
              <div key={lbl} onClick={()=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth",block:"start"})}} style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(4px)",borderRadius:10,padding:"9px 12px",borderBottom:`2px solid ${color}`,cursor:"pointer"}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,.65)",marginBottom:1}}>{ic} {lbl}</div>
                <div style={{fontWeight:800,fontSize:20,color:"#fff",textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"18px 20px"}}>
        {topCrit.length>0&&(
          <div id="seccion-alertas" style={{background:T.alertBg,border:`1px solid ${T.alertBorder}`,borderRadius:12,padding:"10px 16px",marginBottom:14}}>
            <div style={{fontWeight:700,color:T.alertText,fontSize:13,marginBottom:6}}>📋 Insumos más urgentes en toda la red:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{topCrit.map(([ins,c])=><span key={ins} style={{background:T.critBg,color:T.critText,padding:"2px 9px",borderRadius:6,fontSize:12,fontWeight:600}}>{ins} <span style={{opacity:.75}}>({c.CRÍTICO} centros)</span></span>)}</div>
          </div>
        )}
        <PanelEmergencias T={T}/>
        <BarraBusqueda busqCiudad={busqCiudad} setBusqCiudad={setBusqCiudad} busqNombre={busqNombre} setBusqNombre={setBusqNombre} filtrados={filtrados.length} total={centros.length} filtradosRef={filtradosRef.length} totalRef={refugios.length} filtradosHosp={filtradosHosp.length} totalHosp={hospitales.length} pinActivo={pinActivo} T={T}/>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 16px",marginBottom:14,boxShadow:T.cardShadow}}>
          <div onClick={()=>setShowFiltrosAvanzados(!showFiltrosAvanzados)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
            <span style={{fontWeight:700,fontSize:13,color:T.text}}>🔍 Filtros avanzados {(filtroEstado||filtroNivel||filtroInsumo)?<span style={{background:"#CF1A2F",color:"#fff",fontSize:10,padding:"1px 7px",borderRadius:10,marginLeft:5}}>Activos</span>:""}</span>
            <span style={{fontSize:12,color:T.textMuted}}>{showFiltrosAvanzados?"▲ Ocultar":"▼ Mostrar"}</span>
          </div>
          {showFiltrosAvanzados&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
              <div>
                <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:4,fontWeight:600}}>🗺️ Estado</label>
                <select value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)} style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:T.text,fontSize:12}}>
                  <option value="">Todos los estados</option>
                  {ESTADOS.map(e=><option key={e} value={e}>{e}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:4,fontWeight:600}}>🔴 Nivel de urgencia</label>
                <select value={filtroNivel} onChange={e=>setFiltroNivel(e.target.value)} style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:T.text,fontSize:12}}>
                  <option value="">Todos los niveles</option>
                  <option value="CRÍTICO">🔴 Con críticos</option>
                  <option value="ALTO">🟠 Con altos o críticos</option>
                  <option value="SIN_CRITICOS">🟢 Sin críticos</option>
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:4,fontWeight:600}}>📦 Tipo de insumo</label>
                <select value={filtroInsumo} onChange={e=>setFiltroInsumo(e.target.value)} style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:T.text,fontSize:12}}>
                  <option value="">Todos los insumos</option>
                  <option value="Agua">💧 Agua</option>
                  <option value="Alimento">🍚 Alimentos</option>
                  <option value="Medicina">💊 Medicinas</option>
                  <option value="Colchoneta">🏕️ Colchonetas</option>
                  <option value="Pañal">👶 Pañales</option>
                  <option value="Ropa">👕 Ropa</option>
                  <option value="Herramienta">🔧 Herramientas</option>
                </select>
              </div>
              {(filtroEstado||filtroNivel||filtroInsumo)&&(
                <div style={{gridColumn:"1/4",textAlign:"center"}}>
                  <button onClick={()=>{setFiltroEstado("");setFiltroNivel("");setFiltroInsumo("");}} style={{background:T.surface2,color:T.textMuted,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 16px",cursor:"pointer",fontSize:11,fontWeight:600}}>✕ Limpiar filtros</button>
                </div>
              )}
            </div>
          )}
        </div>
        <div id="mapa-id">
          <MapaPrincipal key="main-map" centros={filtrados.length>0?filtrados:centros} refugios={(busqCiudad||busqNombre)?filtradosRef:refugios} hospitales={(busqCiudad||busqNombre)?filtradosHosp:hospitales} pinActivoId={pinActivo?.id} onPinClick={c=>setPinActivo(c)} mapaRef={mapaRef} showHeatMap={showHeatMap} setShowHeatMap={setShowHeatMap} heatFilter={heatFilter} setHeatFilter={setHeatFilter} T={T}/>
        </div>
        <div id="seccion-centros" style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>📦 Centros de Acopio Registrados</span>
          <span style={{fontSize:11,color:T.textMuted,fontWeight:400}}>Toca una tarjeta para verlo en el mapa 👆</span>
        </div>
        {filtrados.length===0
          ?<div style={{textAlign:"center",padding:"28px",color:T.textFaint,background:T.surface,borderRadius:12,marginBottom:14}}><div style={{fontSize:28,marginBottom:6}}>👤</div><div>No se encontraron centros con esos criterios.</div></div>
          :<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:9,marginBottom:8}}>{filtrados.slice(0,verMasCentros?999:4).map(c=><Tarjeta key={c.id} centro={c} activo={pinActivo?.id===c.id} T={T} onSeleccionar={seleccionarCentro} onVerDetalle={setDetalle} onCert={setCert}/>)}</div>
          {filtrados.length>4&&!verMasCentros&&<div onClick={()=>setVerMasCentros(true)} style={{textAlign:"center",padding:"10px",background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,cursor:"pointer",marginBottom:14,fontWeight:700,fontSize:13,color:"#CF1A2F"}}>▶ Ver los {filtrados.length} centros de acopio</div>}
          </>
        }
        <div id="seccion-refugios" style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10}}>🏕️ Refugios y Albergues Verificados <span style={{fontSize:11,color:T.textMuted,fontWeight:400}}>({(busqCiudad||busqNombre?filtradosRef:refugios).length})</span></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:9,marginBottom:8}}>
          {(busqCiudad||busqNombre?filtradosRef:refugios).slice(0,verMasRefugios?999:4).map(r=>(
            <div key={r.id} onClick={()=>seleccionarRefugio(r)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"11px 14px",boxShadow:T.cardShadow,borderLeft:"4px solid #1A73E8",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#1A73E8"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
              <div style={{display:"flex",gap:4,marginBottom:3}}><span style={{fontSize:10,background:"#E3F2FD",color:"#0D47A1",padding:"1px 6px",borderRadius:20}}>🏕️ Refugio</span></div>
              <div style={{fontWeight:700,color:T.text,fontSize:13,marginBottom:1}}>{r.name}</div>
              <div style={{color:T.textMuted,fontSize:11,marginBottom:5}}>📍 {r.city}</div>
              <div style={{color:T.textFaint,fontSize:11,marginBottom:6}}>{r.desc}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <a href={`https://www.google.com/maps?q=${r.lat},${r.lon}&z=17`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:3,background:"#E3F2FD",color:"#0D47A1",border:"1px solid #90CAF9",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>?🗺️ Maps</a>
                <span style={{fontSize:10,color:T.textMuted,marginLeft:"auto"}}>Ocup: {r.cur}/{r.cap}</span>
              </div>
            </div>
          ))}
        </div>
        {(busqCiudad||busqNombre?filtradosRef:refugios).length>4&&!verMasRefugios&&<div onClick={()=>setVerMasRefugios(true)} style={{textAlign:"center",padding:"10px",background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,cursor:"pointer",marginBottom:14,fontWeight:700,fontSize:13,color:"#1A73E8"}}>▶ Ver los {(busqCiudad||busqNombre?filtradosRef:refugios).length} refugios</div>}
        <div id="seccion-hospitales" style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10}}>🏥 Hospitales <span style={{fontSize:11,color:T.textMuted,fontWeight:400}}>({(busqCiudad||busqNombre?filtradosHosp:hospitales).length})</span></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:9,marginBottom:8}}>
          {(busqCiudad||busqNombre?filtradosHosp:hospitales).slice(0,verMasHospitales?999:4).map(h=>(
            <div key={h.id} onClick={()=>{if(h.lat&&h.lon)seleccionarCentro({lat:h.lat,lng:h.lon,id:h.id,nombre:h.name,ciudad:h.city,estado:h.state});}} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"11px 14px",boxShadow:T.cardShadow,borderLeft:"4px solid #2E7D32",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#2E7D32"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
              <div style={{display:"flex",gap:4,marginBottom:3}}><span style={{fontSize:10,background:"#E8F5E9",color:"#2E7D32",padding:"1px 6px",borderRadius:20}}>🏥 {h.type}</span><span style={{fontSize:10,background:"#E8F5E9",color:"#2E7D32",padding:"1px 6px",borderRadius:20}}>✅ Activo</span></div>
              <div style={{fontWeight:700,color:T.text,fontSize:13,marginBottom:1}}>{h.name}</div>
              <div style={{color:T.textMuted,fontSize:11,marginBottom:5}}>📍 {h.city}, {h.state}</div>
              <div style={{color:T.textFaint,fontSize:11,marginBottom:6}}>{h.desc}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <a href={`https://www.google.com/maps?q=${h.lat},${h.lon}&z=17`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:3,background:"#E8F5E9",color:"#2E7D32",border:"1px solid #A5D6A7",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>🗺️ Maps</a>
                <a href={`tel:${(h.phone||"").replace(/\D/g,"")}`} onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:3,background:"#E3F2FD",color:"#0D47A1",border:"1px solid #90CAF9",borderRadius:5,padding:"3px 7px",fontSize:10,fontWeight:700,textDecoration:"none"}}>📞 {h.phone}</a>
              </div>
            </div>
          ))}
        </div>
        {(busqCiudad||busqNombre?filtradosHosp:hospitales).length>4&&!verMasHospitales&&<div onClick={()=>setVerMasHospitales(true)} style={{textAlign:"center",padding:"10px",background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,cursor:"pointer",marginBottom:14,fontWeight:700,fontSize:13,color:"#2E7D32"}}>▶ Ver los {(busqCiudad||busqNombre?filtradosHosp:hospitales).length} hospitales</div>}
        <div style={{padding:"11px 14px",background:T.surface,border:`1px dashed ${T.border}`,borderRadius:12,textAlign:"center",cursor:"pointer",marginBottom:16}} onClick={()=>setRegistro(true)}><span style={{color:"#CF1A2F",fontWeight:700,fontSize:13}}>+ ¿Tu centro de acopio no aparece? Regístralo gratis ?</span></div>
      </div>
      <div style={{borderTop:`1px solid ${T.border}`,padding:"12px 20px",background:T.surface}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:10,color:T.textFaint}}>Red Nacional de Centros de Acopio · Emergencia Sísmica Venezuela 2026<br/><a href="https://responsegrid.app" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4"}}>ResponseGrid</a> by <a href="https://globalemergency.online" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4"}}>Global Emergency</a> — CC BY-SA 4.0 · Mapa: OpenStreetMap</div>
          <div style={{display:"flex",gap:12,fontSize:11}}>
            <a href="https://panitasmap.org" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>PanitasMap</a>
            <a href="https://auxiliovenezuela.com" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>AuxilioVenezuela</a>
            <a href="https://centraldeayudavenezuela.com" target="_blank" rel="noopener noreferrer" style={{color:"#4285F4",textDecoration:"none"}}>Central de Ayuda</a>
          </div>
        </div>
      </div>
      {detalle&&<Detalle centro={detalle} onClose={()=>setDetalle(null)} onCert={c=>{setDetalle(null);setCert(c);}} T={T}/>}
      {registro&&<Registro centros={centros} onClose={()=>setRegistro(false)} onGuardar={c=>setCentros(p=>[...p,c])} T={T}/>}
      {cert&&<Certificado centro={cert} onClose={()=>setCert(null)} T={T} darkMode={darkMode}/>}
      {showLogin&&<LoginAdmin onLogin={()=>{setAdminOk(true);setShowLogin(false);setShowDash(true);}} onClose={()=>setShowLogin(false)} T={T}/>}
      {showDash&&adminOk&&<Dashboard centros={centros} refugios={refugios} onClose={()=>setShowDash(false)} T={T}/>}
      {showVoluntarios&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowVoluntarios(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#2E7D32,#4CAF50)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>👥 Gestión de Voluntarios</div>
              <button onClick={()=>setShowVoluntarios(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <VoluntariosPanel voluntarios={voluntarios} setVoluntarios={setVoluntarios} centros={centros} T={T}/>
            </div>
          </div>
        </div>
      )}
      {showInventario&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowInventario(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#E65100,#FF8C00)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>📦 Control de Inventario</div>
              <button onClick={()=>setShowInventario(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <InventarioPanel inventario={inventario} setInventario={setInventario} centros={centros} T={T}/>
            </div>
          </div>
        </div>
      )}
      {showAnalytics&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(6px)"}} onClick={()=>setShowAnalytics(false)}>
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"linear-gradient(135deg,#6A1B9A,#9C27B0)",padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>📊 Analíticas</div>
              <button onClick={()=>setShowAnalytics(false)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{padding:14}}>
              <AnalyticsPanel centros={centros} refugios={refugios} voluntarios={voluntarios} inventario={inventario} T={T}/>
            </div>
          </div>
        </div>
      )}
      {showLoginCentro&&!dashCentro&&<LoginCentro T={T} centros={centros} onLogin={(c)=>{setDashCentro(c);setShowLoginCentro(false);}}/>}
      {dashCentro&&<DashboardCentro centro={dashCentro} onClose={()=>setDashCentro(null)} T={T} addToast={addToast} saveFirebase={(path,data)=>{const ok=firebaseSave(path,data);if(!ok)queueSync(path,data);}} darkMode={darkMode} toggleTheme={()=>setThemeMode(m=>m==="dark"?"light":"dark")}/>}
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
